<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pretext Weather</title>
</head>
<body style="margin:0;padding:0;background:#0a0a0f;display:flex;justify-content:center;align-items:center;min-height:100vh;">
  <canvas id="c" style="max-width:100vw;max-height:100vh;"></canvas>
  
  <script>
    // Simple fallback text measurement (when Pretext unavailable)
    function simpleMeasure(text, fontSize, maxWidth) {
      const approxCharWidth = fontSize * 0.6;
      const charsPerLine = Math.floor(maxWidth / approxCharWidth);
      const lines = [];
      let remaining = text;
      while (remaining.length > charsPerLine) {
        lines.push({ text: remaining.substring(0, charsPerLine), y: lines.length * fontSize * 1.2 });
        remaining = remaining.substring(charsPerLine);
      }
      if (remaining.length > 0) {
        lines.push({ text: remaining, y: lines.length * fontSize * 1.2 });
      }
      return { lines: lines.length > 0 ? lines : [{ text: text, y: 0 }], height: (lines.length || 1) * fontSize * 1.2 };
    }
    
    window.onload = async function() {
      // Try loading Pretext
      let pretextLoaded = false;
      try {
        const response = await fetch('https://unpkg.com/@chenglou/pretext@0.0.3/dist/layout.js');
        if (response.ok) {
          const script = document.createElement('script');
          script.type = 'module';
          script.textContent = `
            import { prepareWithSegments, layoutWithLines } from 'https://unpkg.com/@chenglou/pretext@0.0.3/dist/layout.js';
            window.pretextAvailable = true;
            window.measureText = function(text, font, maxWidth) {
              try {
                const prepared = prepareWithSegments(text, font);
                return layoutWithLines(prepared, maxWidth, 32);
              } catch(e) {
                return null;
              }
            };
            window.dispatchEvent(new Event('pretextReady'));
          `;
          document.head.appendChild(script);
          await new Promise(resolve => {
            window.addEventListener('pretextReady', resolve);
            setTimeout(resolve, 2000); // timeout fallback
          });
          pretextLoaded = window.pretextAvailable || false;
        }
      } catch(e) {
        console.log('Pretext failed, using fallback:', e);
      }
      
      // Canvas setup
      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      const BASE_W = 500;
      const BASE_H = 950;
      let scale = 1;
      
      function resize() {
        scale = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H);
        canvas.width = BASE_W * scale;
        canvas.height = BASE_H * scale;
        canvas.style.width = (BASE_W * scale) + 'px';
        canvas.style.height = (BASE_H * scale) + 'px';
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
      }
      resize();
      window.addEventListener('resize', resize);
      
      // Measure function (Pretext or fallback)
      function measureText(text, font, maxWidth) {
        if (window.measureText && pretextLoaded) {
          const result = window.measureText(text, font, maxWidth);
          if (result) return result;
        }
        const fontSize = parseInt(font) || 20;
        return simpleMeasure(text, fontSize, maxWidth);
      }
      
      // Stars
      const stars = [];
      for (let i = 0; i < 150; i++) {
        stars.push({
          x: Math.random() * BASE_W,
          y: Math.random() * BASE_H,
          r: 0.5 + Math.random() * 2,
          speed: 0.5 + Math.random() * 2,
          phase: Math.random() * Math.PI * 2
        });
      }
      
      // Weather data
      const weather = {
        location: 'Huber Heights, Ohio',
        temp: '62°',
        desc: 'Overcast',
        feels: 'Feels like 62°F',
        humidity: '38%',
        wind: '9 mph',
        pressure: '30.1',
        hourly: [
          { hour: '11 PM', icon: '☁️', temp: '58°' },
          { hour: '12 AM', icon: '🌙', temp: '55°' },
          { hour: '1 AM', icon: '🌙', temp: '52°' },
          { hour: '2 AM', icon: '🌙', temp: '50°' },
          { hour: '3 AM', icon: '🌙', temp: '48°' },
          { hour: '4 AM', icon: '🌤️', temp: '47°' },
          { hour: '5 AM', icon: '🌤️', temp: '48°' },
          { hour: '6 AM', icon: '🌅', temp: '51°' }
        ],
        astroSun: [
          { label: 'Sunrise', value: '7:26 AM', icon: '🌅' },
          { label: 'Solar Noon', value: '1:42 PM', icon: '☀️' },
          { label: 'Sunset', value: '7:58 PM', icon: '🌇' }
        ],
        astroMoon: [
          { label: 'Moon Phase', value: 'Waxing Gibbous', icon: '🌕' },
          { label: 'Moonrise', value: '4:39 PM', icon: '🌙' },
          { label: 'Moonset', value: '5:48 AM', icon: '🌤️' }
        ],
        fiveDay: [
          { day: 'Tomorrow', icon: '☁️', temps: '58°/72°' },
          { day: 'Tuesday', icon: '🌧️', temps: '50°/65°' },
          { day: 'Wednesday', icon: '⛈️', temps: '48°/62°' },
          { day: 'Thursday', icon: '🌤️', temps: '45°/58°' },
          { day: 'Friday', icon: '☀️', temps: '50°/65°' }
        ]
      };
      
      let time = 0;
      
      function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }
      
      function draw() {
        time += 0.016;
        const cx = BASE_W / 2;
        
        // Background
        const bgGrad = ctx.createLinearGradient(0, 0, 0, BASE_H);
        bgGrad.addColorStop(0, '#1a0a2e');
        bgGrad.addColorStop(0.4, '#0f0a1a');
        bgGrad.addColorStop(1, '#0a0a0f');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, BASE_W, BASE_H);
        
        // Aurora
        const auroraY = 50 + Math.sin(time * 0.5) * 20;
        const auroraGrad = ctx.createLinearGradient(0, auroraY, 0, auroraY + 200);
        auroraGrad.addColorStop(0, `rgba(139, 92, 246, ${0.15 + Math.sin(time) * 0.05})`);
        auroraGrad.addColorStop(0.5, `rgba(168, 85, 247, ${0.2 + Math.sin(time * 1.2) * 0.05})`);
        auroraGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = auroraGrad;
        ctx.fillRect(0, auroraY, BASE_W, 200);
        
        // Glow orbs
        ctx.save();
        ctx.filter = 'blur(80px)';
        ctx.fillStyle = `rgba(139, 92, 246, ${0.25 + Math.sin(time) * 0.05})`;
        ctx.beginPath();
        ctx.arc(100 + Math.sin(time * 0.7) * 30, 200 + Math.cos(time * 0.5) * 40, 100, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = `rgba(236, 72, 153, ${0.2 + Math.cos(time) * 0.05})`;
        ctx.beginPath();
        ctx.arc(400 + Math.cos(time * 0.6) * 25, 180 + Math.sin(time * 0.8) * 35, 80, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        
        // Stars
        for (const star of stars) {
          const twinkle = 0.5 + 0.5 * Math.sin(time * star.speed + star.phase);
          ctx.fillStyle = `rgba(255, 255, 255, ${twinkle * 0.8})`;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.r * twinkle, 0, Math.PI * 2);
          ctx.fill();
        }
        
        // Title
        ctx.fillStyle = '#a78bfa';
        ctx.font = '24px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(weather.location, cx, 70);
        
        // Weather icon
        const iconY = 130 + Math.sin(time * 1.5) * 8;
        ctx.font = '80px serif';
        ctx.fillText('☁️', cx, iconY + 70);
        
        // Temperature
        const tempGrad = ctx.createLinearGradient(0, 220, 0, 350);
        tempGrad.addColorStop(0, '#ffffff');
        tempGrad.addColorStop(0.4, '#c084fc');
        tempGrad.addColorStop(0.7, '#ec4899');
        ctx.fillStyle = tempGrad;
        ctx.font = 'bold 120px Inter, sans-serif';
        ctx.fillText(weather.temp, cx, 330);
        
        // Description
        ctx.fillStyle = '#e5e5e5';
        ctx.font = 'bold 48px Inter, sans-serif';
        ctx.fillText(weather.desc, cx, 365);
        ctx.fillStyle = '#6b7280';
        ctx.font = '18px Inter, sans-serif';
        ctx.fillText(weather.feels, cx, 395);
        
        // Metrics
        const metricsY = 440;
        const metrics = [
          { icon: '💧', value: weather.humidity, label: 'Humidity' },
          { icon: '💨', value: weather.wind, label: 'Wind' },
          { icon: '🌡️', value: weather.pressure, label: 'Pressure' }
        ];
        const boxSpacing = 120;
        
        for (let i = 0; i < metrics.length; i++) {
          const mx = cx - boxSpacing + i * boxSpacing - 50;
          const boxY = metricsY + Math.sin(time * 2 + i) * 3;
          
          ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
          roundRect(mx, boxY, 100, 90, 16);
          ctx.fill();
          
          ctx.strokeStyle = `rgba(168, 85, 247, ${0.2 + Math.sin(time + i) * 0.1})`;
          ctx.lineWidth = 1.5;
          roundRect(mx, boxY, 100, 90, 16);
          ctx.stroke();
          
          ctx.font = '24px serif';
          ctx.textAlign = 'center';
          ctx.fillText(metrics[i].icon, mx + 50, boxY + 30);
          ctx.fillStyle = '#c084fc';
          ctx.font = 'bold 28px Inter, sans-serif';
          ctx.fillText(metrics[i].value, mx + 50, boxY + 60);
          ctx.fillStyle = '#6b7280';
          ctx.font = '14px Inter, sans-serif';
          ctx.fillText(metrics[i].label, mx + 50, boxY + 80);
        }
        
        // Hourly
        let hourlyY = 560;
        ctx.fillStyle = '#a78bfa';
        ctx.font = 'bold 14px Inter, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('⏰ HOURLY FORECAST', 40, hourlyY);
        hourlyY += 25;
        
        for (let i = 0; i < weather.hourly.length; i++) {
          const hx = 40 + i * 55;
          const hoverOffset = Math.sin(time * 3 + i * 0.5) * 2;
          
          ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
          roundRect(hx, hourlyY + hoverOffset, 50, 95, 12);
          ctx.fill();
          
          ctx.fillStyle = '#6b7280';
          ctx.font = '12px Inter, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(weather.hourly[i].hour, hx + 25, hourlyY + 18 + hoverOffset);
          ctx.font = '22px serif';
          ctx.fillText(weather.hourly[i].icon, hx + 25, hourlyY + 50 + hoverOffset);
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 16px Inter, sans-serif';
          ctx.fillText(weather.hourly[i].temp, hx + 25, hourlyY + 78 + hoverOffset);
        }
        
        // Astronomy
        let astroY = 700;
        ctx.fillStyle = '#a78bfa';
        ctx.font = 'bold 14px Inter, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('🌌 ASTRONOMY', 40, astroY);
        astroY += 30;
        
        // Sun arc
        ctx.strokeStyle = 'rgba(249, 115, 22, 0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, astroY + 5, 140, Math.PI, 0);
        ctx.stroke();
        
        for (let i = 0; i < weather.astroSun.length; i++) {
          const ax = 85 + i * 160;
          const bobY = Math.sin(time * 1.5 + i) * 3;
          ctx.font = '32px serif';
          ctx.textAlign = 'center';
          ctx.fillText(weather.astroSun[i].icon, ax, astroY + 25 + bobY);
          ctx.fillStyle = '#6b7280';
          ctx.font = '12px Inter, sans-serif';
          ctx.fillText(weather.astroSun[i].label, ax, astroY + 45 + bobY);
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 18px Inter, sans-serif';
          ctx.fillText(weather.astroSun[i].value, ax, astroY + 68 + bobY);
        }
        
        // Moon
        astroY += 95;
        for (let i = 0; i < weather.astroMoon.length; i++) {
          const ax = 85 + i * 160;
          const moonBob = Math.sin(time * 1.2 + i + 1) * 3;
          ctx.font = '32px serif';
          ctx.textAlign = 'center';
          ctx.fillText(weather.astroMoon[i].icon, ax, astroY + 25 + moonBob);
          ctx.fillStyle = '#6b7280';
          ctx.font = '12px Inter, sans-serif';
          ctx.fillText(weather.astroMoon[i].label, ax, astroY + 45 + moonBob);
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 16px Inter, sans-serif';
          ctx.fillText(weather.astroMoon[i].value, ax, astroY + 68 + moonBob);
        }
        
        // 5-Day
        let fiveDayY = astroY + 95;
        ctx.fillStyle = '#a78bfa';
        ctx.font = 'bold 14px Inter, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('📅 5-DAY OUTLOOK', 40, fiveDayY);
        fiveDayY += 25;
        
        for (let i = 0; i < weather.fiveDay.length; i++) {
          const dy = fiveDayY + i * 35;
          const rowHover = Math.sin(time * 2 + i * 0.7) * 1;
          
          ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
          roundRect(40, dy + rowHover, 420, 32, 8);
          ctx.fill();
          
          ctx.font = '20px serif';
          ctx.textAlign = 'left';
          ctx.fillText(weather.fiveDay[i].icon, 55, dy + 22 + rowHover);
          ctx.fillStyle = '#ffffff';
          ctx.font = '20px Inter, sans-serif';
          ctx.fillText(weather.fiveDay[i].day, 90, dy + 22 + rowHover);
          ctx.fillStyle = '#a78bfa';
          ctx.font = 'bold 18px Inter, sans-serif';
          ctx.textAlign = 'right';
          ctx.fillText(weather.fiveDay[i].temps, 445, dy + 22 + rowHover);
        }
        
        // Tonight
        let tonightY = fiveDayY + 215;
        ctx.fillStyle = '#a78bfa';
        ctx.font = 'bold 14px Inter, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('🌙 TONIGHT', 40, tonightY);
        tonightY += 25;
        
        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
        roundRect(40, tonightY, 420, 65, 16);
        ctx.fill();
        
        ctx.strokeStyle = `rgba(168, 85, 247, ${0.3 + Math.sin(time * 2) * 0.15})`;
        ctx.lineWidth = 1.5;
        roundRect(40, tonightY, 420, 65, 16);
        ctx.stroke();
        
        ctx.font = '32px serif';
        ctx.textAlign = 'left';
        ctx.fillText('🌙', 60, tonightY + 38 + Math.sin(time * 1.8) * 4);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 24px Inter, sans-serif';
        ctx.fillText('Mostly Clear', 100, tonightY + 35);
        ctx.fillStyle = '#6b7280';
        ctx.font = '14px Inter, sans-serif';
        ctx.fillText('Low 45°F  •  Wind SSW 5-10  •  Precip 0%', 100, tonightY + 55);
        
        // Footer
        ctx.textAlign = 'center';
        ctx.fillStyle = '#4b5563';
        ctx.font = '14px Inter, sans-serif';
        ctx.fillText('Data from wttr.in  •  Pretext-Powered UI', cx, 915);
        ctx.fillStyle = '#8b5cf6';
        ctx.fillText('🦆 DuckBot Weather', cx, 935);
      }
      
      // Start animation
      setInterval(draw, 16);
      console.log('Weather app running!');
    };
  </script>
</body>
</html>
