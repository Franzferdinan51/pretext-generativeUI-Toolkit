<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather — Huber Heights</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 460;
canvas.width = W;
canvas.style.width = W + 'px';

// ── CORRECT REAL DATA (from Open-Meteo, EDT-aware) ───────
// Current time: ~2PM EDT, 2026-03-30
const weather = {
  location: 'Huber Heights, OH',
  updated: '2:00 PM EDT · Mar 30',

  current: {
    temp_f:     72,
    feels_f:    69,
    humidity:   53,
    cloud:      3,
    condition:  'Clear',
    icon:       '☀️',
  },

  wind:   { mph: 16, direction: 'SW' },
  pressure: { hpa: 1017.7, inHg: 30.05 },
  uv:      3,
  dewpoint_f: 56,
  visibility: '10 mi',

  today: { high_f: 74, low_f: 59 },

  sunrise: '7:22 AM',
  sunset:  '7:58 PM',

  precip_today: '0.0 mm',

  // Real hourly — 2PM to 10PM EDT (correct UTC→EDT conversion)
  hourly: [
    { hour: '2 PM',  temp_f: 72, icon: '☀️',  precip: '3%'  },
    { hour: '3 PM',  temp_f: 73, icon: '☀️',  precip: '3%'  },
    { hour: '4 PM',  temp_f: 74, icon: '☀️',  precip: '3%'  },
    { hour: '5 PM',  temp_f: 74, icon: '☀️',  precip: '2%'  },
    { hour: '6 PM',  temp_f: 75, icon: '☀️',  precip: '2%'  },
    { hour: '7 PM',  temp_f: 74, icon: '🌤️', precip: '1%'  },
    { hour: '8 PM',  temp_f: 72, icon: '🌤️', precip: '1%'  },
    { hour: '9 PM',  temp_f: 70, icon: '🌙',  precip: '1%'  },
  ],

  outlook: [
    {
      day:       'Today',
      condition: 'Clear',
      icon:      '☀️',
      high:      74,
      low:       59,
      precip:    '0%',
    },
    {
      day:       'Tue Mar 31',
      condition: 'Mostly Sunny',
      icon:      '☀️',
      high:      81,
      low:       61,
      precip:    '0%',
    },
    {
      day:       'Wed Apr 1',
      condition: 'Chance Rain',
      icon:      '🌧️',
      high:      67,
      low:       52,
      precip:    '60%',
    },
  ],
};

// ── HELPERS ───────────────────────────────────────────
function dt(text, size, x, y, color, align = 'center', weight = 'normal') {
  ctx.font = `${weight} ${size}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.fillText(text, x, y);
  ctx.textAlign = 'left';
}

function fr(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function panel(x, y, w, h, r = 16) {
  rr(x, y, w, h, r);
  ctx.fillStyle = '#161b22';
  ctx.fill();
}

// ── WEATHER EFFECTS ───────────────────────────────────
const stars = Array.from({length: 30}, () => ({
  x: Math.random() * W,
  y: Math.random() * W * 0.42,
  r: Math.random() * 1.2 + 0.2,
  ph: Math.random() * Math.PI * 2,
  sp: Math.random() * 0.3 + 0.05
}));

const clouds = [
  {x: 20,  y: 50, sc: 0.9,  spd:  0.08, op: 0.07},
  {x: 210, y: 36, sc: 0.7,  spd: -0.06, op: 0.055},
  {x: 340, y: 88, sc: 0.85, spd:  0.07, op: 0.065},
];

const rays = Array.from({length: 10}, (_, i) => ({
  ang: (i / 10) * Math.PI * 2,
  len: 115 + Math.random() * 45,
  ph:  (i / 10) * Math.PI * 2,
  w:   2 + Math.random() * 1.8
}));

function cloudShape(cx, cy, sc) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(sc, sc);
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(0, 0, 24, 0, Math.PI * 2);
  ctx.arc(23, -6, 18, 0, Math.PI * 2);
  ctx.arc(42, 0, 20, 0, Math.PI * 2);
  ctx.arc(15, 10, 14, 0, Math.PI * 2);
  ctx.arc(33, 8, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, W * 0.46);
  g.addColorStop(0,    '#0b1a38');
  g.addColorStop(0.5,  '#1a3a6a');
  g.addColorStop(1,    '#2a5a9a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, W * 0.46);

  // Sun
  const sx = W * 0.72, sy = W * 0.15;
  const sp = 1 + Math.sin(t * 1.2) * 0.04;
  for (let i = 4; i >= 1; i--) {
    ctx.save(); ctx.filter = `blur(${i * 12}px)`;
    ctx.fillStyle = `rgba(255, 210, 80, ${0.055 / i})`;
    ctx.beginPath(); ctx.arc(sx, sy, 38 * i * sp, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  }
  ctx.save(); ctx.filter = 'blur(8px)';
  ctx.fillStyle = '#ffe066'; ctx.beginPath(); ctx.arc(sx, sy, 34 * sp, 0, Math.PI * 2); ctx.fill(); ctx.restore();

  // Rays
  ctx.save(); ctx.translate(sx, sy);
  for (const r of rays) {
    ctx.strokeStyle = `rgba(255, 225, 100, ${0.045 + Math.sin(t * 0.6 + r.ph) * 0.025})`;
    ctx.lineWidth = r.w; ctx.lineCap = 'round';
    ctx.beginPath();
    const len = r.len * (1 + Math.sin(t + r.ph) * 0.06);
    ctx.moveTo(0, 0); ctx.lineTo(Math.cos(r.ang) * len, Math.sin(r.ang) * len);
    ctx.stroke();
  } ctx.restore();

  // Clouds
  for (const c of clouds) {
    c.x += c.spd;
    if (c.x > W + 100) c.x = -100;
    ctx.save(); ctx.globalAlpha = c.op; cloudShape(c.x, c.y, c.sc); ctx.restore();
  }

  // Stars
  for (const s of stars) {
    ctx.fillStyle = `rgba(255,255,255,${0.2 + Math.sin(t * s.sp + s.ph) * 0.2})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }
}

// ── STAT BOX ─────────────────────────────────────────
function stat(cx, label, value, sub) {
  const bw = 92, bh = 72;
  const bx = cx - bw / 2;
  const by = y;
  panel(bx, by, bw, bh, 12);
  dt(label,  9,  cx, by + 14, '#484f58', 'center', 'bold');
  dt(value, 18,  cx, by + 33, '#f0f6fc', 'center', 'bold');
  if (sub) dt(sub, 9, cx, by + 52, '#6e7681', 'center');
  return bh;
}

function spacer(h) { y += h; }

// ── LAYOUT ───────────────────────────────────────────
const MX = 20, MW = W - MX * 2;

function divider(x1, x2, yy) {
  fr(x1, yy, x2 - x1, 1, '#21262d');
}

// ── RENDER ───────────────────────────────────────────
let t = 0;

function render() {
  t += 0.016;

  const skyH = Math.floor(W * 0.46);
  const cardH = 730;
  canvas.height = skyH + cardH;
  canvas.style.height = (skyH + cardH) + 'px';

  // Base fill
  fr(0, 0, W, skyH + cardH, '#0d1117');

  // Sky
  drawSky();

  // ── CARD BODY ───────────────────────────────────────
  ctx.save();
  ctx.translate(0, skyH);

  y = 18;

  // Location + update
  dt(weather.location, 14, W / 2, y, '#8b949e', 'center', 'bold');
  y += 20;
  dt(weather.updated, 10, W / 2, y, '#484f58');
  y += 30;

  // Main temp
  const pulse = Math.sin(t * 1.2) * 1;
  ctx.save(); ctx.filter = 'blur(8px)';
  dt(`${weather.current.temp_f}°`, 92, W / 2, y + 58 + pulse, 'rgba(255,255,255,0.12)', 'center', 'bold'); ctx.restore();
  dt(`${weather.current.temp_f}°`, 92, W / 2, y + 58 + pulse, '#f0f6fc', 'center', 'bold');
  y += 92;

  dt(weather.current.condition, 22, W / 2, y, '#f0f6fc', 'center', 'bold');
  y += 26;
  dt(`Feels like ${weather.current.feels_f}°`, 12, W / 2, y, '#6e7681');
  y += 32;

  // Stats row 1
  const sw = (MW - 16 * 3) / 4;
  stat(MX + sw * 0.5,              'HUMIDITY',   `${weather.current.humidity}%`,  null);
  stat(MX + sw * 1.5 + 16,       'WIND',       `${weather.wind.mph} mph`,       weather.wind.direction);
  stat(MX + sw * 2.5 + 16 * 2,  'PRESSURE',   `${Math.round(weather.pressure.hpa)} hPa`, `${weather.pressure.inHg} in`);
  stat(MX + sw * 3.5 + 16 * 3,  'UV INDEX',   `${weather.uv}`,                   weather.uv < 3 ? 'Low' : weather.uv < 6 ? 'Moderate' : 'High');
  y += 14;

  // Stats row 2
  stat(MX + sw * 0.5,              'DEW POINT',  `${weather.dewpoint_f}°F`,  null);
  stat(MX + sw * 1.5 + 16,         'VISIBILITY', weather.visibility,           null);
  stat(MX + sw * 2.5 + 16 * 2,    'PRECIP',     weather.precip_today,          '0.00 in today');
  stat(MX + sw * 3.5 + 16 * 3,    'CLOUDS',     `${weather.current.cloud}%`,   null);
  y += 18;

  // High / Low / Sun row
  panel(MX, y, MW, 52, 12);
  const hlY = y;
  y += 52;

  const mid = W / 2;

  dt('HIGH',       9,  MX + 44,   hlY + 13, '#f85149', 'center', 'bold');
  dt(`${weather.today.high_f}°`, 20, MX + 44,  hlY + 33, '#f85149', 'center', 'bold');

  divider(mid - 22, mid + 22, hlY + 16);

  dt('LOW',        9,  mid,       hlY + 13, '#58a6ff', 'center', 'bold');
  dt(`${weather.today.low_f}°`,  20, mid,      hlY + 33, '#58a6ff', 'center', 'bold');

  divider(mid + 62, mid + 148, hlY + 16);

  dt('SUNRISE',    8,  mid + 105, hlY + 12, '#d29922', 'center', 'bold');
  dt(weather.sunrise, 14, mid + 105, hlY + 32, '#d29922', 'center', 'bold');

  divider(mid + 168, mid + 230, hlY + 16);

  dt('SUNSET',     8,  W - MX - 38, hlY + 12, '#f97316', 'center', 'bold');
  dt(weather.sunset,  14, W - MX - 38, hlY + 32, '#f97316', 'center', 'bold');

  y += 16;

  // Hourly forecast
  panel(MX, y, MW, 118, 16);
  const hfY = y;
  y += 24;
  dt('HOURLY FORECAST', 10, W / 2, hfY + 8, '#484f58', 'center', 'bold');
  y += 8;

  const n = weather.hourly.length;
  const itemW = (MW - 8) / n;
  for (let i = 0; i < n; i++) {
    const h = weather.hourly[i];
    const ix = MX + 4 + i * itemW + itemW / 2;
    const iy = y + 4;
    const bob = Math.sin(t * 2 + i * 0.5) * 1.5;

    dt(h.icon,     20, ix, iy + bob,     '#f0f6fc');
    dt(h.hour,      9, ix, iy + 26,      '#6e7681');
    dt(`${h.temp_f}°`, 14, ix, iy + 44, '#f0f6fc', 'center', 'bold');
    const pColor = parseInt(h.precip) > 20 ? '#58a6ff' : '#3d444d';
    dt(h.precip,    9, ix, iy + 62,      pColor);
  }
  y += 90;

  y += 14;

  // 3-day outlook
  panel(MX, y, MW, 112, 16);
  const outY = y;
  y += 24;
  dt('3-DAY OUTLOOK', 10, W / 2, outY + 8, '#484f58', 'center', 'bold');
  y += 8;

  const od = (MW - 8) / 3;
  for (let i = 0; i < weather.outlook.length; i++) {
    const o = weather.outlook[i];
    const ox = MX + 4 + i * od + od / 2;
    const oy = y + 8;

    dt(o.day,       10, ox, oy,       '#8b949e', 'center', 'bold');
    dt(o.icon,      26, ox, oy + 20,  '#f0f6fc');
    dt(o.condition, 10, ox, oy + 46,  '#6e7681');
    dt(`${o.high}°`, 14, ox, oy + 62, '#f0f6fc', 'center', 'bold');
    dt(`${o.low}°`,  12, ox, oy + 78,  '#6e7681');
  }
  y += 112;

  y += 10;
  dt('Open-Meteo · Huber Heights, OH', 9, W / 2, y, '#21262d');

  ctx.restore();

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
