<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather — Huber Heights</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 460;
canvas.width = W;
canvas.style.width = W + 'px';

// ── WEATHER DATA ──────────────────────────────────────
const weather = {
  location: 'Huber Heights, OH',
  updated: '1:15 PM EDT',
  current: { temp_f: 70, feels_f: 67, humidity: 55, cloud: 6, condition: 'Clear', icon: '☀️' },
  wind: { mph: 17, direction: 'WSW' },
  pressure: { hpa: 1018.8, inHg: 30.09 },
  uv: 3.5, dewpoint_f: 54, visibility: '10 mi',
  today: { high_f: 75, low_f: 60 },
  sunrise: '7:25 AM', sunset: '7:55 PM',
  precip_mm: 0,
  hourly: [
    { hour: '12PM', temp_f: 68, icon: '☀️',  precip: '4%' },
    { hour: '1PM',  temp_f: 70, icon: '☀️',  precip: '2%' },
    { hour: '2PM',  temp_f: 72, icon: '☀️',  precip: '2%' },
    { hour: '3PM',  temp_f: 74, icon: '⛅', precip: '2%' },
    { hour: '4PM',  temp_f: 74, icon: '⛅', precip: '3%' },
    { hour: '5PM',  temp_f: 75, icon: '⛅', precip: '3%' },
    { hour: '6PM',  temp_f: 74, icon: '🌤️', precip: '4%' },
    { hour: '7PM',  temp_f: 73, icon: '🌤️', precip: '4%' },
    { hour: '8PM',  temp_f: 70, icon: '🌙',  precip: '3%' },
  ],
  outlook: [
    { day: 'Tomorrow',   condition: 'Partly Cloudy', icon: '⛅',  high: 71, low: 55, precip: '20%' },
    { day: 'Wednesday',  condition: 'Chance Rain',   icon: '🌧️', high: 65, low: 50, precip: '60%' },
    { day: 'Thursday',  condition: 'Mostly Sunny',  icon: '☀️',  high: 68, low: 48, precip: '5%'  },
  ]
};

// ── HELPERS ───────────────────────────────────────────
function dt(text, size, x, y, color, align = 'center', weight = 'normal') {
  ctx.font = `${weight} ${size}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.fillText(text, x, y);
  ctx.textAlign = 'left';
}

function fillRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function roundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function panel(x, y, w, h, r = 16) {
  roundedRect(x, y, w, h, r);
  ctx.fillStyle = '#161b22';
  ctx.fill();
}

// ── WEATHER EFFECTS ───────────────────────────────────
const stars = Array.from({length: 35}, () => ({
  x: Math.random() * W,
  y: Math.random() * W * 0.45,
  r: Math.random() * 1.2 + 0.2,
  phase: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.3 + 0.05
}));

const clouds = [
  {x: 20,  y: 50, sc: 1.0,  spd:  0.09, op: 0.08},
  {x: 210, y: 35, sc: 0.75, spd: -0.06, op: 0.06},
  {x: 340, y: 85, sc: 0.9,  spd:  0.08, op: 0.07},
];

const rays = Array.from({length: 10}, (_, i) => ({
  ang: (i / 10) * Math.PI * 2,
  len: 120 + Math.random() * 50,
  ph:  (i / 10) * Math.PI * 2,
  w:   2 + Math.random() * 2
}));

function cloudShape(cx, cy, sc) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(sc, sc);
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(0, 0, 24, 0, Math.PI * 2);
  ctx.arc(24, -6, 18, 0, Math.PI * 2);
  ctx.arc(42, 0, 20, 0, Math.PI * 2);
  ctx.arc(16, 10, 14, 0, Math.PI * 2);
  ctx.arc(34, 8, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, W * 0.50);
  sky.addColorStop(0, '#0a1628');
  sky.addColorStop(0.5, '#1a3a6a');
  sky.addColorStop(1, '#2a5a9a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, W * 0.50);

  const sx = W * 0.72, sy = W * 0.16;
  const sp = 1 + Math.sin(t * 1.2) * 0.04;

  // Sun glow rings
  for (let i = 4; i >= 1; i--) {
    ctx.save(); ctx.filter = `blur(${i * 12}px)`;
    ctx.fillStyle = `rgba(255, 210, 80, ${0.06 / i})`;
    ctx.beginPath(); ctx.arc(sx, sy, 40 * i * sp, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  }
  // Sun core
  ctx.save(); ctx.filter = 'blur(8px)';
  ctx.fillStyle = '#ffe066'; ctx.beginPath(); ctx.arc(sx, sy, 36 * sp, 0, Math.PI * 2); ctx.fill(); ctx.restore();

  // Sun rays
  ctx.save(); ctx.translate(sx, sy);
  for (const r of rays) {
    ctx.strokeStyle = `rgba(255, 225, 100, ${0.05 + Math.sin(t * 0.6 + r.ph) * 0.03})`;
    ctx.lineWidth = r.w; ctx.lineCap = 'round';
    ctx.beginPath();
    const len = r.len * (1 + Math.sin(t + r.ph) * 0.06);
    ctx.moveTo(0, 0); ctx.lineTo(Math.cos(r.ang) * len, Math.sin(r.ang) * len);
    ctx.stroke();
  } ctx.restore();

  // Clouds
  for (const c of clouds) {
    c.x += c.spd;
    if (c.x > W + 100) c.x = -100;
    ctx.save(); ctx.globalAlpha = c.op; cloudShape(c.x, c.y, c.sc); ctx.restore();
  }

  // Stars
  for (const s of stars) {
    ctx.fillStyle = `rgba(255,255,255,${0.2 + Math.sin(t * s.speed + s.phase) * 0.2})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }

  // Wind streaks
  for (let i = 0; i < 3; i++) {
    const yp = W * 0.3 + i * 22 + Math.sin(t * 0.4 + i) * 3;
    const xp = ((t * 60 + i * 150) % (W + 60)) - 30;
    ctx.save(); ctx.globalAlpha = 0.04;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.beginPath();
    ctx.moveTo(xp, yp); ctx.lineTo(xp + 30 + Math.sin(t * 2 + i) * 6, yp); ctx.stroke();
    ctx.restore();
  }
}

// ── LAYOUT CONSTANTS ──────────────────────────────────
const MX = 20, MW = W - MX * 2;
let y = 0;

function ny(h)   { const ry = y; y += h; return ry; }
function gap(h)  { y += h; }
function px()    { return MX; }
function pw()    { return MW; }

const PANEL_W = MW;

// ── STAT BOX ─────────────────────────────────────────
function drawStat(cx, label, value, sub) {
  const bw = 90, bh = 70;
  const bx = cx - bw / 2;
  const by = y;
  panel(bx, by, bw, bh, 12);
  dt(label, 9,  cx, by + 14, '#484f58', 'center', 'bold');
  dt(value, 18, cx, by + 34, '#f0f6fc', 'center', 'bold');
  if (sub) dt(sub, 9, cx, by + 52, '#6e7681', 'center');
}

// ── RENDER ───────────────────────────────────────────
let t = 0;

function render() {
  t += 0.016;
  y = 0;

  canvas.height = 720;
  canvas.style.height = '720px';

  // Background
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, 720);

  drawBackground();

  // ── CARD AREA (sits below sky) ──────────────────────
  const cardTop = Math.floor(W * 0.38);
  ctx.save();
  ctx.translate(0, cardTop);

  // Card background
  panel(px(), 0, pw(), 690, 28);

  // Move y origin to inside card
  y = 20;

  // ── LOCATION + TIME ─────────────────────────────────
  dt(weather.location, 14, W / 2, y, '#8b949e', 'center', 'bold');
  y += 18;
  dt(weather.updated, 10, W / 2, y, '#484f58');
  y += 26;

  // ── MAIN TEMP ────────────────────────────────────────
  const tmp = weather.current.temp_f;
  const pulse = Math.sin(t * 1.2) * 1;
  ctx.save(); ctx.filter = 'blur(8px)';
  dt(`${tmp}°`, 90, W / 2, y + 60 + pulse, 'rgba(255,255,255,0.12)', 'center', 'bold'); ctx.restore();
  dt(`${tmp}°`, 90, W / 2, y + 60 + pulse, '#f0f6fc', 'center', 'bold');
  y += 88;
  dt(weather.current.condition, 22, W / 2, y, '#f0f6fc', 'center', 'bold');
  y += 24;
  dt(`Feels like ${weather.current.feels_f}°`, 12, W / 2, y, '#6e7681');
  y += 28;

  // ── STATS ROW 1 ─────────────────────────────────────
  const gap1 = 16;
  const sw = (MW - gap1 * 3) / 4;
  const row1y = y;
  y += 72;

  drawStat(MX + sw * 0.5,               'HUMIDITY',   `${weather.current.humidity}%`,  null);
  drawStat(MX + sw * 1.5 + gap1,        'WIND',       `${weather.wind.mph} mph`,      weather.wind.direction);
  drawStat(MX + sw * 2.5 + gap1 * 2,   'PRESSURE',   `${weather.pressure.hpa.toFixed(0)} hPa`, `${weather.pressure.inHg.toFixed(2)} in`);
  drawStat(MX + sw * 3.5 + gap1 * 3,   'UV INDEX',   `${weather.uv}`,               weather.uv < 3 ? 'Low' : weather.uv < 6 ? 'Moderate' : 'High');

  y += 14;

  // ── STATS ROW 2 ─────────────────────────────────────
  const row2y = y;
  y += 72;

  drawStat(MX + sw * 0.5,               'DEW POINT',  `${weather.dewpoint_f}°F`,    null);
  drawStat(MX + sw * 1.5 + gap1,        'VISIBILITY', weather.visibility,           null);
  drawStat(MX + sw * 2.5 + gap1 * 2,    'PRECIP',     `${weather.precip_mm} mm`,     '0.00 in');
  drawStat(MX + sw * 3.5 + gap1 * 3,    'CLOUDS',     `${weather.current.cloud}%`,   null);

  y += 14;

  // ── HIGH / LOW / SUN ─────────────────────────────────
  panel(px(), y, pw(), 52, 12);
  const hlY = y;
  y += 52;

  const mid = W / 2;

  // HIGH
  dt('HIGH', 9,  MX + 44, hlY + 14, '#f85149', 'center', 'bold');
  dt(`${weather.today.high_f}°`, 20, MX + 44, hlY + 34, '#f85149', 'center', 'bold');

  // Separator 1
  ctx.fillStyle = '#21262d'; ctx.fillRect(mid - 22, hlY + 14, 1, 28);

  // LOW
  dt('LOW', 9, mid, hlY + 14, '#58a6ff', 'center', 'bold');
  dt(`${weather.today.low_f}°`, 20, mid, hlY + 34, '#58a6ff', 'center', 'bold');

  // Separator 2
  ctx.fillStyle = '#21262d'; ctx.fillRect(mid + 65, hlY + 14, 1, 28);

  // SUNRISE
  dt('SUNRISE', 8, mid + 108, hlY + 12, '#d29922', 'center', 'bold');
  dt(weather.sunrise, 14, mid + 108, hlY + 32, '#d29922', 'center', 'bold');

  // Separator 3
  ctx.fillStyle = '#21262d'; ctx.fillRect(mid + 170, hlY + 14, 1, 28);

  // SUNSET
  dt('SUNSET', 8, W - MX - 30, hlY + 12, '#f97316', 'center', 'bold');
  dt(weather.sunset, 14, W - MX - 30, hlY + 32, '#f97316', 'center', 'bold');

  y += 14;

  // ── HOURLY FORECAST ──────────────────────────────────
  panel(px(), y, pw(), 120, 16);
  const hfInner = y;
  y += 28;
  dt("HOURLY", 10, W / 2, hfInner + 10, '#484f58', 'center', 'bold');
  y += 6;

  const n = weather.hourly.length;
  const itemW = (MW - 8) / n;
  const startX = MX + 4;
  for (let i = 0; i < n; i++) {
    const h = weather.hourly[i];
    const ix = startX + i * itemW + itemW / 2;
    const iy = y + 4;
    const bob = Math.sin(t * 2 + i * 0.4) * 1.5;
    dt(h.icon, 20, ix, iy + bob, '#f0f6fc', 'center');
    dt(h.hour, 9, ix, iy + 26, '#6e7681');
    dt(`${h.temp_f}°`, 14, ix, iy + 44, '#f0f6fc', 'center', 'bold');
    const pColor = parseInt(h.precip) > 30 ? '#58a6ff' : '#3d444d';
    dt(h.precip, 9, ix, iy + 62, pColor);
  }
  y += 90;

  y += 10;

  // ── 3-DAY OUTLOOK ────────────────────────────────────
  panel(px(), y, pw(), 108, 16);
  const outInner = y;
  y += 24;
  dt("3-DAY OUTLOOK", 10, W / 2, outInner + 8, '#484f58', 'center', 'bold');
  y += 6;

  const od = (MW - 8) / 3;
  for (let i = 0; i < weather.outlook.length; i++) {
    const o = weather.outlook[i];
    const ox = MX + 8 + i * od + od / 2;
    const oy = y + 8;

    dt(o.day, 10, ox, oy, '#8b949e', 'center', 'bold');
    dt(o.icon, 26, ox, oy + 18, '#f0f6fc', 'center');
    dt(o.condition, 10, ox, oy + 44, '#6e7681');
    dt(`${o.high}°`, 14, ox, oy + 60, '#f0f6fc', 'center', 'bold');
    dt(`${o.low}°`, 12, ox, oy + 76, '#6e7681');
  }
  y += 108;

  y += 8;
  dt('Open-Meteo · Huber Heights, OH', 9, W / 2, y, '#21262d');

  ctx.restore();

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
