<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass Weather — Huber Heights</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080818;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ── CANVAS SETUP ─────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480;
canvas.width = W;
canvas.style.width = W + 'px';

// ── WEATHER DATA (real from Open-Meteo) ─────────────────
const weather = {
  location: 'Huber Heights, OH',
  updated: 'Updated 1:15 PM EDT',
  current: { temp_f: 70, feels_f: 67, humidity: 55, cloud: 6, condition: 'Clear', icon: '☀️' },
  wind: { mph: 17, direction: 'WSW', deg: 221 },
  pressure: { hpa: 1018.8, inHg: 30.09 },
  uv: 3.5, dewpoint_f: 54, visibility: '10 mi',
  today: { high_f: 75, low_f: 60 },
  sunrise: '7:25 AM', sunset: '7:55 PM',
  precip_mm: 0,
  hourly: [
    { hour: '12PM', temp_f: 68, icon: '☀️',  precip: '4%' },
    { hour: '1PM',  temp_f: 70, icon: '☀️',  precip: '2%' },
    { hour: '2PM',  temp_f: 72, icon: '☀️',  precip: '2%' },
    { hour: '3PM',  temp_f: 74, icon: '⛅', precip: '2%' },
    { hour: '4PM',  temp_f: 74, icon: '⛅', precip: '3%' },
    { hour: '5PM',  temp_f: 75, icon: '⛅', precip: '3%' },
    { hour: '6PM',  temp_f: 74, icon: '🌤️', precip: '4%' },
    { hour: '7PM',  temp_f: 73, icon: '🌤️', precip: '4%' },
    { hour: '8PM',  temp_f: 70, icon: '🌙',  precip: '3%' },
  ],
  outlook: [
    { day: 'Tomorrow',   condition: 'Partly Cloudy', icon: '⛅',  high: 71, low: 55, precip: '20%' },
    { day: 'Wednesday',  condition: 'Chance Rain',   icon: '🌧️', high: 65, low: 50, precip: '60%' },
    { day: 'Thursday',  condition: 'Mostly Sunny',    icon: '☀️',  high: 68, low: 48, precip: '5%'  },
  ]
};

// ── PALETTE ────────────────────────────────────────────
const P = {
  skyTop:    '#0a1a4a',
  skyMid:    '#1a4a8a',
  skyBot:    '#2980b9',
  sunCore:   '#ffe066',
  sunGlow:   '#f39c12',
  tintR: 180, tintG: 200, tintB: 255,
};

// ── TEXT HELPERS (Canvas 2D — zero dependencies) ───────
function setFont(size, weight = 'normal') {
  ctx.font = `${weight} ${size}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
}

function textWidth(text, size, weight) {
  setFont(size, weight);
  return ctx.measureText(text).width;
}

function drawText(text, size, x, y, color = '#fff', align = 'center', weight = 'normal') {
  ctx.font = `${weight} ${size}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.textBaseline = 'top';
  let dx = x;
  if (align === 'center') dx = x;
  else if (align === 'right') { ctx.textAlign = 'right'; dx = x; }
  ctx.fillText(text, dx, y);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

// Wrapped text helper
function drawWrapped(text, size, x, y, maxW, color, align = 'center', weight = 'normal') {
  ctx.font = `${weight} ${size}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.textBaseline = 'top';
  let dx = align === 'center' ? x - maxW / 2 : align === 'right' ? x - maxW : x;
  const words = text.split(' ');
  let line = '', lineY = y;
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line.trim(), dx, lineY);
      line = word;
      lineY += size + 4;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line.trim(), dx, lineY);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

// ── LIQUID GLASS ───────────────────────────────────────
function glass(x, y, w, h, r = 14, blur = 14, op = 0.08) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.clip();

  // Blurred tinted fill
  ctx.filter = `blur(${blur}px)`;
  ctx.fillStyle = `rgba(${P.tintR},${P.tintG},${P.tintB},${op})`;
  ctx.fillRect(x, y, w, h);
  ctx.filter = 'none';

  // Top specular highlight
  const hg = ctx.createLinearGradient(x, y, x, y + h * 0.5);
  hg.addColorStop(0, `rgba(255,255,255,${op * 2.6})`);
  hg.addColorStop(0.4, `rgba(255,255,255,${op * 0.6})`);
  hg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hg;
  ctx.fillRect(x, y, w, h * 0.5);

  // Animated shimmer streak
  const sw = w * 0.3;
  const sp = (t * 0.25 % 1) * (w + sw) - sw;
  const sg = ctx.createLinearGradient(x + sp, y, x + sp + sw, y + h * 0.35);
  sg.addColorStop(0, 'rgba(255,255,255,0)');
  sg.addColorStop(0.5, `rgba(255,255,255,${op * 3})`);
  sg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(x + sp, y, sw, h * 0.35);

  ctx.restore();

  // Border
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.strokeStyle = `rgba(200,215,255,0.18)`;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

// ── STAT BLOCK ─────────────────────────────────────────
function stat(x, y, w, h, label, value, sub) {
  glass(x, y, w, h, 12, 12, 0.07);
  drawText(label, 10, x + w / 2, y + 14, '#64748b', 'center', 'bold');
  drawText(value, 24, x + w / 2, y + 30, '#ffffff', 'center', 'bold');
  if (sub) drawText(sub, 10, x + w / 2, y + 56, '#475569', 'center');
}

// ── WEATHER EFFECTS ────────────────────────────────────
const stars = Array.from({ length: 55 }, () => ({
  x: Math.random() * W,
  y: Math.random() * W * 0.5,
  r: Math.random() * 1.4 + 0.3,
  phase: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.4 + 0.1
}));

const clouds = [
  { x: 50,  y: 60, scale: 1.1, speed:  0.13, op: 0.11 },
  { x: 260, y: 42, scale: 0.8, speed: -0.09, op: 0.08 },
  { x: 385, y: 100, scale: 0.95, speed:  0.11, op: 0.09 },
  { x: 140, y: 120, scale: 0.65, speed: -0.07, op: 0.06 },
];

const rays = Array.from({ length: 14 }, (_, i) => ({
  angle: (i / 14) * Math.PI * 2,
  length: 150 + Math.random() * 70,
  phase: (i / 14) * Math.PI * 2,
  w: 2 + Math.random() * 2.5
}));

function cloud(cx, cy, sc) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(sc, sc);
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.beginPath();
  ctx.arc(0, 0, 28, 0, Math.PI * 2);
  ctx.arc(27, -7, 21, 0, Math.PI * 2);
  ctx.arc(48, 0, 23, 0, Math.PI * 2);
  ctx.arc(18, 11, 17, 0, Math.PI * 2);
  ctx.arc(39, 9, 19, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function background() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, W * 0.62);
  sky.addColorStop(0, P.skyTop);
  sky.addColorStop(0.55, P.skyMid);
  sky.addColorStop(1, P.skyBot);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, W * 0.62);

  // Sun glow rings
  const sx = W * 0.73, sy = W * 0.17;
  const sp = 1 + Math.sin(t * 1.5) * 0.05;
  for (let i = 5; i >= 1; i--) {
    ctx.save();
    ctx.filter = `blur(${i * 14}px)`;
    ctx.fillStyle = `rgba(255,200,60,${0.07 / i})`;
    ctx.beginPath();
    ctx.arc(sx, sy, 48 * i * sp, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Sun core
  ctx.save();
  ctx.filter = 'blur(10px)';
  ctx.fillStyle = P.sunCore;
  ctx.beginPath();
  ctx.arc(sx, sy, 42 * sp, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Sun rays
  ctx.save();
  ctx.translate(sx, sy);
  for (const r of rays) {
    const a = 0.06 + Math.sin(t * 0.7 + r.phase) * 0.04;
    ctx.strokeStyle = `rgba(255,225,110,${a})`;
    ctx.lineWidth = r.w;
    ctx.lineCap = 'round';
    ctx.beginPath();
    const len = r.length * (1 + Math.sin(t + r.phase) * 0.07);
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(r.angle) * len, Math.sin(r.angle) * len);
    ctx.stroke();
  }
  ctx.restore();

  // Clouds
  for (const c of clouds) {
    c.x += c.speed;
    if (c.x > W + 120) c.x = -120;
    ctx.save();
    ctx.globalAlpha = c.op;
    cloud(c.x, c.y, c.scale);
    ctx.restore();
  }

  // Stars
  for (const s of stars) {
    const a = 0.3 + Math.sin(t * s.speed + s.phase) * 0.3;
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Wind streaks
  for (let i = 0; i < 5; i++) {
    const yp = W * 0.28 + i * 24 + Math.sin(t * 0.5 + i) * 4;
    const xp = ((t * 75 + i * 195) % (W + 80)) - 40;
    ctx.save();
    ctx.globalAlpha = 0.03 + Math.sin(t + i) * 0.015;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(xp, yp);
    ctx.lineTo(xp + 35 + Math.sin(t * 2 + i) * 8, yp);
    ctx.stroke();
    ctx.restore();
  }
}

// ── LAYOUT ─────────────────────────────────────────────
const MX = 16, MW = W - MX * 2;
const GAP = 10;
let y = 14;

function next(h) { const ry = y; y += h + GAP; return ry; }
function row4(w) { return (MW - GAP * 3) / 4; }

// ── MAIN RENDER ────────────────────────────────────────
let t = 0;

function render() {
  t += 0.016;
  y = 14;

  const H = 820;
  canvas.height = H;
  canvas.style.height = H + 'px';

  // Base fill
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, W, H);

  background();

  // ── LOCATION ─────────────────────────────────────────
  const locY = next(46);
  glass(MX, locY, MW, 46, 14, 10, 0.06);
  drawText(weather.location, 15, W / 2, locY + 10, '#e2e8f0', 'center', 'bold');
  drawText(weather.updated, 10, W / 2, locY + 32, '#475569');

  // ── MAIN TEMP ────────────────────────────────────────
  const mainY = next(168);
  glass(MX, mainY, MW, 168, 20, 16, 0.07);
  const pulse = Math.sin(t * 1.2) * 1.5;
  const tempY = mainY + 120 + pulse;
  // Glow copy
  ctx.save();
  ctx.filter = 'blur(8px)';
  setFont(98, 'bold');
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.textAlign = 'center';
  ctx.fillText(`${weather.current.temp_f}°`, W / 2, tempY);
  ctx.restore();
  // Main temp
  setFont(98, 'bold');
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText(`${weather.current.temp_f}°`, W / 2, tempY);
  drawText(weather.current.condition, 26, W / 2, mainY + 148, '#e2e8f0', 'center', 'bold');
  drawText(`Feels like ${weather.current.feels_f}°F`, 12, W / 2, mainY + 180, '#64748b');

  // ── STATS ROW 1 ─────────────────────────────────────
  const s1Y = next(76);
  const sw = row4();
  stat(MX, s1Y, sw, 76, 'HUMIDITY', `${weather.current.humidity}%`, null);
  stat(MX + sw + GAP, s1Y, sw, 76, 'WIND', `${weather.wind.mph} mph`, weather.wind.direction);
  stat(MX + (sw + GAP) * 2, s1Y, sw, 76, 'PRESSURE', `${weather.pressure.hpa.toFixed(0)} hPa`, `${weather.pressure.inHg.toFixed(1)} inHg`);
  stat(MX + (sw + GAP) * 3, s1Y, sw, 76, 'UV INDEX', `${weather.uv}`, weather.uv < 3 ? 'Low' : weather.uv < 6 ? 'Moderate' : 'High');

  // ── STATS ROW 2 ─────────────────────────────────────
  const s2Y = next(76);
  stat(MX, s2Y, sw, 76, 'DEW POINT', `${weather.dewpoint_f}°F`, null);
  stat(MX + sw + GAP, s2Y, sw, 76, 'VISIBILITY', weather.visibility, null);
  stat(MX + (sw + GAP) * 2, s2Y, sw, 76, 'PRECIP TODAY', `${weather.precip_mm} mm`, '0.00 in');
  stat(MX + (sw + GAP) * 3, s2Y, sw, 76, 'CLOUDS', `${weather.current.cloud}%`, null);

  // ── HIGH/LOW ────────────────────────────────────────
  const hlY = next(54);
  glass(MX, hlY, MW, 54, 12, 10, 0.06);
  const mid = W / 2;

  // High
  setFont(10); ctx.fillStyle = '#f87171'; ctx.textAlign = 'center'; ctx.fillText('HIGH', MX + 44, hlY + 14);
  setFont(22, 'bold'); ctx.fillStyle = '#f87171'; ctx.textAlign = 'center'; ctx.fillText(`${weather.today.high_f}°`, MX + 44, hlY + 30);

  // Separator
  ctx.fillStyle = '#1e293b'; ctx.fillRect(mid - 18, hlY + 10, 1, 34);

  // Low
  setFont(10); ctx.fillStyle = '#60a5fa'; ctx.textAlign = 'center'; ctx.fillText('LOW', mid + 18, hlY + 14);
  setFont(22, 'bold'); ctx.fillStyle = '#60a5fa'; ctx.textAlign = 'center'; ctx.fillText(`${weather.today.low_f}°`, mid + 18, hlY + 30);

  // Separator
  ctx.fillStyle = '#1e293b'; ctx.fillRect(mid + 78, hlY + 10, 1, 34);

  // Sunrise
  setFont(9, 'bold'); ctx.fillStyle = '#fbbf24'; ctx.textAlign = 'center'; ctx.fillText('SUNRISE', mid + 112, hlY + 12);
  setFont(16, 'bold'); ctx.fillStyle = '#fbbf24'; ctx.textAlign = 'center'; ctx.fillText(weather.sunrise, mid + 112, hlY + 30);

  // Sunset
  setFont(9, 'bold'); ctx.fillStyle = '#fb923c'; ctx.textAlign = 'right'; ctx.fillText('SUNSET', W - MX, hlY + 12);
  setFont(16, 'bold'); ctx.fillStyle = '#fb923c'; ctx.textAlign = 'right'; ctx.fillText(weather.sunset, W - MX, hlY + 30);

  // ── HOURLY FORECAST ──────────────────────────────────
  const hfY = next(192);
  glass(MX, hfY, MW, 192, 14, 12, 0.06);
  setFont(11, 'bold'); ctx.fillStyle = '#64748b'; ctx.textAlign = 'center'; ctx.fillText("TODAY'S FORECAST", W / 2, hfY + 16);

  const n = weather.hourly.length;
  const itemW = (MW - 8) / n;
  const startX = MX + 4;
  for (let i = 0; i < n; i++) {
    const h = weather.hourly[i];
    const ix = startX + i * itemW + itemW / 2;
    const iy = hfY + 34;
    const bob = Math.sin(t * 2.5 + i * 0.5) * 2;

    // Icon glow
    ctx.save();
    ctx.filter = 'blur(8px)';
    setFont(22);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.textAlign = 'center';
    ctx.fillText(h.icon, ix, iy + bob);
    ctx.restore();

    // Icon
    setFont(22);
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.fillText(h.icon, ix, iy + bob);

    drawText(h.hour, 10, ix, iy + 24, '#64748b');
    drawText(`${h.temp_f}°`, 15, ix, iy + 42, '#e2e8f0', 'center', 'bold');
    drawText(h.precip, 10, ix, iy + 60, parseInt(h.precip) > 30 ? '#6474b8' : '#334155');
  }

  // ── 3-DAY OUTLOOK ────────────────────────────────────
  const outY = next(120);
  glass(MX, outY, MW, 120, 14, 12, 0.06);
  setFont(11, 'bold'); ctx.fillStyle = '#64748b'; ctx.textAlign = 'center'; ctx.fillText('3-DAY OUTLOOK', W / 2, outY + 16);

  const od = (MW - 8) / 3;
  for (let i = 0; i < weather.outlook.length; i++) {
    const o = weather.outlook[i];
    const ox = MX + 8 + i * od + od / 2;
    const oy = outY + 38;

    drawText(o.day, 11, ox, oy, '#94a3b8', 'center', 'bold');

    // Icon glow
    ctx.save(); ctx.filter = 'blur(6px)'; setFont(30); ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.textAlign = 'center'; ctx.fillText(o.icon, ox, oy + 30); ctx.restore();
    setFont(30); ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.fillText(o.icon, ox, oy + 30);

    drawWrapped(o.condition, 10, ox, oy + 48, od - 16, '#475569');
    drawText(`${o.high}° / ${o.low}°`, 13, ox, oy + 68, '#e2e8f0', 'center', 'bold');
    drawText(`Rain ${o.precip}`, 10, ox, oy + 86, parseInt(o.precip) > 40 ? '#60a5fa' : '#475569');
  }

  // ── BOTTOM TAGLINE ────────────────────────────────────
  drawText('Open-Meteo · Canvas 2D · Huber Heights, OH', 9, W / 2, y + 4, '#1e293b');

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
