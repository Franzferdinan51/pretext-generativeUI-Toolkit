<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass Weather — Huber Heights</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080818;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
    }
    canvas {
      display: block;
      max-width: 100vw;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
import { prepareWithSegments, layoutWithLines } from '/layout.js';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Set canvas size — 500 wide, content-driven height
const W = 500;
canvas.width = W;
canvas.style.width = W + 'px';

// ── WEATHER DATA (real from Open-Meteo) ─────────────────
const WMO = {
  0:'Clear',1:'Mainly Clear',2:'Partly Cloudy',3:'Overcast',
  45:'Fog',48:'Rime Fog',51:'Light Drizzle',53:'Drizzle',55:'Drizzle',
  61:'Light Rain',63:'Rain',65:'Heavy Rain',71:'Light Snow',
  73:'Snow',75:'Heavy Snow',80:'Rain Showers',81:'Rain Showers',
  82:'Rain Showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'
};

const weather = {
  location: 'Huber Heights, OH',
  updated: '1:15 PM EDT',
  current: {
    temp_f: 70, feels_f: 67, humidity: 55,
    cloud: 6, condition: 'Clear', code: 0, icon: '☀️'
  },
  wind: { mph: 17, direction: 'WSW', deg: 221 },
  pressure: { hpa: 1018.8, inHg: 30.09 },
  uv: 3.5, dewpoint_f: 54, visibility_mi: 10,
  today: { high_f: 75, low_f: 60 },
  sunrise: '7:25 AM', sunset: '7:55 PM',
  precip_today_mm: 0,
  hourly: [
    {hour:'12PM',temp_f:68,icon:'☀️',precip:'4%'},
    {hour:'1PM', temp_f:70,icon:'☀️',precip:'2%'},
    {hour:'2PM', temp_f:72,icon:'☀️',precip:'2%'},
    {hour:'3PM', temp_f:74,icon:'⛅',precip:'2%'},
    {hour:'4PM', temp_f:74,icon:'⛅',precip:'3%'},
    {hour:'5PM', temp_f:75,icon:'⛅',precip:'3%'},
    {hour:'6PM', temp_f:74,icon:'🌤️',precip:'4%'},
    {hour:'7PM', temp_f:73,icon:'🌤️',precip:'4%'},
    {hour:'8PM', temp_f:70,icon:'🌙',precip:'3%'},
  ],
  outlook: [
    {day:'Tomorrow',  condition:'Partly Cloudy', icon:'⛅', high:71, low:55, precip:'20%'},
    {day:'Wednesday', condition:'Chance Rain',  icon:'🌧️', high:65, low:50, precip:'60%'},
    {day:'Thursday',  condition:'Mostly Sunny',  icon:'☀️', high:68, low:48, precip:'5%'},
  ]
};

// ── PALETTE ────────────────────────────────────────────
const P = {
  skyTop: '#0a1a4a', skyMid: '#1a4a8a', skyBot: '#2980b9',
  sun: '#ffe066', sunGlow: '#f39c12',
  tintR: 180, tintG: 200, tintB: 255,
};

// ── PRETEXT HELPERS ────────────────────────────────────
function txt(text, font, maxW = 460, lh = 22) {
  const p = prepareWithSegments(text, String(font));
  return layoutWithLines(p, maxW, lh);
}

function draw(text, font, x, y, color = '#fff', align = 'center') {
  ctx.font = String(font);
  ctx.fillStyle = color;
  ctx.textAlign = align;
  const lines = txt(text, font).lines;
  let cx = x;
  if (align === 'center') cx = x;
  else if (align === 'right') ctx.textAlign = 'right';
  for (const line of lines) {
    let dx = cx;
    if (align === 'center') dx = x - line.width / 2;
    else if (align === 'right') dx = x - line.width;
    ctx.fillText(line.text, dx, y + line.y + parseInt(String(font)));
  }
  ctx.textAlign = 'left';
}

// ── LIQUID GLASS PANEL ────────────────────────────────
function glass(x, y, w, h, r = 14, blur = 14, op = 0.08) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.clip();
  ctx.filter = `blur(${blur}px)`;
  ctx.fillStyle = `rgba(${P.tintR},${P.tintG},${P.tintB},${op})`;
  ctx.fillRect(x,y,w,h); ctx.filter = 'none';
  const g = ctx.createLinearGradient(x,y,x,y+h*0.5);
  g.addColorStop(0,`rgba(255,255,255,${op*2.5})`);
  g.addColorStop(0.4,`rgba(255,255,255,${op*0.6})`);
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(x,y,w,h*0.5);
  const sw = w*0.32, sp = (t*0.28%1)*(w+sw)-sw;
  const sg = ctx.createLinearGradient(x+sp,y,x+sp+sw,y+h*0.35);
  sg.addColorStop(0,'rgba(255,255,255,0)');
  sg.addColorStop(0.5,`rgba(255,255,255,${op*3})`);
  sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = sg; ctx.fillRect(x+sp,y,sw,h*0.35);
  ctx.restore();
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.strokeStyle=`rgba(200,215,255,0.18)`; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
}

// ── STAT BLOCK ─────────────────────────────────────────
function stat(x, y, w, h, label, value, sub) {
  glass(x, y, w, h, 12, 12, 0.07);
  draw(label, 'bold 10px Inter', x+w/2, y+17, '#64748b');
  draw(value, 'bold 26px Inter', x+w/2, y+38, '#ffffff');
  if (sub) draw(sub, '10px Inter', x+w/2, y+54, '#475569');
}

// ── WEATHER EFFECTS ────────────────────────────────────
const stars = Array.from({length:55},()=>({x:Math.random()*W,y:Math.random()*W*0.5,r:Math.random()*1.4+0.3,ph:Math.random()*Math.PI*2,sp:Math.random()*0.4+0.1}));
const clouds = [
  {x:50,y:65,sc:1.1,spd:0.13,op:0.11},
  {x:270,y:45,sc:0.8,spd:-0.09,op:0.08},
  {x:390,y:105,sc:0.95,spd:0.11,op:0.09},
  {x:140,y:125,sc:0.65,spd:-0.07,op:0.06},
];
const rays = Array.from({length:14},(_,i)=>({ang:(i/14)*Math.PI*2,len:150+Math.random()*70,ph:(i/14)*Math.PI*2,w:2+Math.random()*2.5}));

function cloud(cx,cy,sc) {
  ctx.save(); ctx.translate(cx,cy); ctx.scale(sc,sc);
  ctx.fillStyle='rgba(255,255,255,0.88)';
  ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2);
  ctx.arc(27,-7,21,0,Math.PI*2); ctx.arc(48,0,23,0,Math.PI*2);
  ctx.arc(18,11,17,0,Math.PI*2); ctx.arc(39,9,19,0,Math.PI*2); ctx.fill(); ctx.restore();
}

function background() {
  // sky
  const sky = ctx.createLinearGradient(0,0,0,W*0.62);
  sky.addColorStop(0,P.skyTop); sky.addColorStop(0.55,P.skyMid); sky.addColorStop(1,P.skyBot);
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,W*0.62);

  // sun glow rings
  const sx=W*0.73, sy=W*0.17, sp=1+Math.sin(t*1.5)*0.05;
  for(let i=5;i>=1;i--){ctx.save();ctx.filter=`blur(${i*14}px)`;ctx.fillStyle=`rgba(255,200,60,${0.07/i})`;ctx.beginPath();ctx.arc(sx,sy,48*i*sp,0,Math.PI*2);ctx.fill();ctx.restore();}
  ctx.save();ctx.filter='blur(10px)';ctx.fillStyle=P.sun;ctx.beginPath();ctx.arc(sx,sy,42*sp,0,Math.PI*2);ctx.fill();ctx.restore();

  // sun rays
  ctx.save(); ctx.translate(sx,sy);
  for(const r of rays){
    const a=0.06+Math.sin(t*0.7+r.ph)*0.04;
    ctx.strokeStyle=`rgba(255,225,110,${a})`; ctx.lineWidth=r.w; ctx.lineCap='round';
    ctx.beginPath(); const len=r.len*(1+Math.sin(t+r.ph)*0.07);
    ctx.moveTo(0,0); ctx.lineTo(Math.cos(r.ang)*len,Math.sin(r.ang)*len); ctx.stroke();
  } ctx.restore();

  // clouds
  for(const c of clouds){c.x+=c.spd;if(c.x>W+100)c.x=-120;ctx.save();ctx.globalAlpha=c.op;cloud(c.x,c.y,c.sc);ctx.restore();}

  // stars
  for(const s of stars){const a=0.3+Math.sin(t*s.sp+s.ph)*0.3;ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}

  // wind streaks
  for(let i=0;i<5;i++){
    const yp=W*0.28+i*24+Math.sin(t*0.5+i)*4;
    const xp=((t*75+i*195)%(W+80))-40;
    ctx.save(); ctx.globalAlpha=0.03+Math.sin(t+i)*0.015;
    ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(xp,yp); ctx.lineTo(xp+35+Math.sin(t*2+i)*8,yp); ctx.stroke(); ctx.restore();
  }
}

// ── LAYOUT CONSTANTS ───────────────────────────────────
const MX = 16, MW = W - MX*2;
let currentY = 14;
const GAP = 10;

function nextY(h) { const y = currentY; currentY += h + GAP; return y; }

// ── RENDER ────────────────────────────────────────────
let t = 0;
let contentH = 0;

function render() {
  t += 0.016;
  currentY = 14;

  // Dark base
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, W, W * 1.56); // 500x780

  // Sky background (top 62%)
  background();

  // ── LOCATION ──
  const locH = 46;
  glass(MX, nextY(locH), MW, locH, 14, 10, 0.06);
  draw(weather.location, 'bold 15px Inter', W/2, currentY - locH - GAP + 17, '#e2e8f0');
  draw('Updated ' + weather.updated, '10px Inter', W/2, currentY - locH - GAP + 35, '#475569');

  // ── MAIN TEMP ──
  const mainH = 165;
  glass(MX, nextY(mainH), MW, mainH, 20, 16, 0.07);
  const pulse = Math.sin(t * 1.2) * 1.5;
  // glow copy
  ctx.save(); ctx.filter='blur(8px)'; ctx.font='bold 100px Inter'; ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillText(`${weather.current.temp_f}°`, W/2, currentY - mainH - GAP + 140 + pulse); ctx.restore();
  ctx.font='bold 100px Inter'; ctx.textAlign='center'; ctx.fillStyle='#ffffff';
  ctx.fillText(`${weather.current.temp_f}°`, W/2, currentY - mainH - GAP + 140 + pulse);
  draw(weather.current.condition, 'bold 26px Inter', W/2, currentY - mainH - GAP + 178, '#e2e8f0');
  draw(`Feels like ${weather.current.feels_f}°F`, '12px Inter', W/2, currentY - mainH - GAP + 200, '#64748b');

  // ── STATS ROW 1 ──
  const r1H = 76;
  const s1Y = nextY(r1H);
  const sw = (MW - GAP*3) / 4;
  stat(MX, s1Y, sw, r1H, 'HUMIDITY', `${weather.current.humidity}%`, null);
  stat(MX+sw+GAP, s1Y, sw, r1H, 'WIND', `${weather.wind.mph} mph`, weather.wind.direction);
  stat(MX+(sw+GAP)*2, s1Y, sw, r1H, 'PRESSURE', `${weather.pressure.hpa.toFixed(0)} hPa`, `${weather.pressure.inHg.toFixed(1)} inHg`);
  stat(MX+(sw+GAP)*3, s1Y, sw, r1H, 'UV INDEX', `${weather.uv}`, weather.uv < 3 ? 'Low' : weather.uv < 6 ? 'Moderate' : 'High');

  // ── STATS ROW 2 ──
  const r2H = 76;
  const s2Y = nextY(r2H);
  stat(MX, s2Y, sw, r2H, 'DEW POINT', `${weather.dewpoint_f}°F`, null);
  stat(MX+sw+GAP, s2Y, sw, r2H, 'VISIBILITY', `${weather.visibility_mi} mi`, null);
  stat(MX+(sw+GAP)*2, s2Y, sw, r2H, 'PRECIP', `${weather.precip_today_mm} mm`, '0.00 in');
  stat(MX+(sw+GAP)*3, s2Y, sw, r2H, 'CLOUDS', `${weather.current.cloud}%`, null);

  // ── HIGH/LOW + SUN ──
  const hlH = 52;
  const hlY = nextY(hlH);
  glass(MX, hlY, MW, hlH, 12, 10, 0.06);
  const mid = W / 2;
  // high
  draw('HIGH', 'bold 10px Inter', MX + 44, hlY + 16, '#f87171');
  draw(`${weather.today.high_f}°`, 'bold 22px Inter', MX + 44, hlY + 38, '#f87171');
  // separator
  ctx.fillStyle = '#1e293b'; ctx.fillRect(mid - 18, hlY + 10, 1, 32);
  // low
  draw('LOW', 'bold 10px Inter', mid + 18, hlY + 16, '#60a5fa');
  draw(`${weather.today.low_f}°`, 'bold 22px Inter', mid + 18, hlY + 38, '#60a5fa');
  // separator
  ctx.fillStyle = '#1e293b'; ctx.fillRect(mid + 78, hlY + 10, 1, 32);
  // sunrise
  draw('SUNRISE', 'bold 9px Inter', mid + 112, hlY + 14, '#fbbf24');
  draw(`${weather.sunrise}`, 'bold 16px Inter', mid + 112, hlY + 34, '#fbbf24');
  // sunset
  draw('SUNSET', 'bold 9px Inter', W - MX - 8, hlY + 14, '#fb923c');
  ctx.textAlign = 'right';
  draw(`${weather.sunset}`, 'bold 16px Inter', W - MX - 8, hlY + 34, '#fb923c');
  ctx.textAlign = 'left';

  // ── HOURLY ──
  const hfH = 188;
  const hfY = nextY(hfH);
  glass(MX, hfY, MW, hfH, 14, 12, 0.06);
  draw("TODAY'S FORECAST", 'bold 11px Inter', W/2, hfY + 17, '#64748b');
  const n = weather.hourly.length;
  const itemW = (MW - 8) / n;
  const startX = MX + 4;
  for(let i = 0; i < n; i++) {
    const h = weather.hourly[i];
    const ix = startX + i * itemW + itemW / 2;
    const iy = hfY + 32;
    const bob = Math.sin(t * 2.5 + i * 0.5) * 2;
    // icon glow
    ctx.save(); ctx.filter='blur(8px)'; ctx.font='bold 22px Inter'; ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillText(h.icon, ix, iy + bob); ctx.restore();
    ctx.font='bold 22px Inter'; ctx.textAlign='center'; ctx.fillStyle='#ffffff';
    ctx.fillText(h.icon, ix, iy + bob);
    draw(h.hour, '10px Inter', ix, iy + 22, '#64748b');
    draw(`${h.temp_f}°`, 'bold 16px Inter', ix, iy + 40, '#e2e8f0');
    draw(h.precip, '10px Inter', ix, iy + 56, parseInt(h.precip) > 30 ? '#6474b8' : '#334155');
  }

  // ── 3-DAY OUTLOOK ──
  const outH = 118;
  const outY = nextY(outH);
  glass(MX, outY, MW, outH, 14, 12, 0.06);
  draw('3-DAY OUTLOOK', 'bold 11px Inter', W/2, outY + 17, '#64748b');
  const od = (MW - 8) / 3;
  for(let i = 0; i < weather.outlook.length; i++) {
    const o = weather.outlook[i];
    const ox = MX + 8 + i * od + od / 2;
    const oy = outY + 36;
    draw(o.day, 'bold 11px Inter', ox, oy, '#94a3b8');
    ctx.save(); ctx.filter='blur(6px)'; ctx.font='bold 30px Inter'; ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.fillText(o.icon, ox, oy + 32); ctx.restore();
    ctx.font='bold 30px Inter'; ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.fillText(o.icon, ox, oy + 32);
    draw(o.condition, '10px Inter', ox, oy + 48, '#475569');
    draw(`${o.high}° / ${o.low}°`, 'bold 13px Inter', ox, oy + 66, '#e2e8f0');
    draw(`Rain ${o.precip}`, '10px Inter', ox, oy + 82, parseInt(o.precip) > 40 ? '#60a5fa' : '#475569');
  }

  // ── BOTTOM ──
  draw('Open-Meteo · Pretext · Canvas', '9px Inter', W/2, currentY + 10, '#1e293b');
  currentY += 18;

  // Extend canvas if needed
  const minH = currentY + 10;
  if (canvas.height < minH) {
    canvas.height = minH;
  }

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
