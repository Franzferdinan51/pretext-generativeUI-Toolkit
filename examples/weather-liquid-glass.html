<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather — Huber Heights</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 440;
canvas.width = W;
canvas.style.width = W + 'px';

const weather = {
  location: 'Huber Heights, OH',
  updated: '1:15 PM EDT',
  current: { temp_f: 70, feels_f: 67, humidity: 55, cloud: 6, condition: 'Clear', icon: '☀️' },
  wind: { mph: 17, direction: 'WSW' },
  pressure: { hpa: 1018.8, inHg: 30.09 },
  uv: 3.5, dewpoint_f: 54, visibility: '10 mi',
  today: { high_f: 75, low_f: 60 },
  sunrise: '7:25 AM', sunset: '7:55 PM',
  precip_mm: 0,
  hourly: [
    { hour: '12PM', temp_f: 68, icon: '☀️',  precip: '4%' },
    { hour: '1PM',  temp_f: 70, icon: '☀️',  precip: '2%' },
    { hour: '2PM',  temp_f: 72, icon: '☀️',  precip: '2%' },
    { hour: '3PM',  temp_f: 74, icon: '⛅', precip: '2%' },
    { hour: '4PM',  temp_f: 74, icon: '⛅', precip: '3%' },
    { hour: '5PM',  temp_f: 75, icon: '⛅', precip: '3%' },
    { hour: '6PM',  temp_f: 74, icon: '🌤️', precip: '4%' },
    { hour: '7PM',  temp_f: 73, icon: '🌤️', precip: '4%' },
    { hour: '8PM',  temp_f: 70, icon: '🌙',  precip: '3%' },
  ],
  outlook: [
    { day: 'Tomorrow',   condition: 'Partly Cloudy', icon: '⛅',  high: 71, low: 55, precip: '20%' },
    { day: 'Wednesday',  condition: 'Chance Rain',   icon: '🌧️', high: 65, low: 50, precip: '60%' },
    { day: 'Thursday',  condition: 'Mostly Sunny',   icon: '☀️',  high: 68, low: 48, precip: '5%'  },
  ]
};

function tx(size, weight = 'normal') {
  ctx.font = `${weight} ${size}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
}
function tw(text, size, weight) {
  tx(size, weight);
  return ctx.measureText(text).width;
}
function dt(text, size, x, y, color, align = 'center', weight = 'normal') {
  tx(size, weight);
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.fillText(text, x, y);
  ctx.textAlign = 'left';
}
function fillRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
function card(x, y, w, h, r = 16) {
  roundRect(x, y, w, h, r);
  ctx.fillStyle = '#161b22';
  ctx.fill();
  roundRect(x, y, w, h, r);
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// Stars and clouds
const stars = Array.from({length: 40}, () => ({
  x: Math.random() * W, y: Math.random() * W * 0.45,
  r: Math.random() * 1.2 + 0.2,
  phase: Math.random() * Math.PI * 2, speed: Math.random() * 0.3 + 0.05
}));
const clouds = [
  {x: 20, y: 50, sc: 1.0, spd: 0.10, op: 0.08},
  {x: 220, y: 35, sc: 0.75, spd: -0.07, op: 0.06},
  {x: 340, y: 85, sc: 0.9, spd: 0.09, op: 0.07},
];
const rays = Array.from({length: 10}, (_, i) => ({
  ang: (i/10) * Math.PI * 2, len: 130 + Math.random() * 50,
  ph: (i/10) * Math.PI * 2, w: 2 + Math.random() * 2
}));

function cloudShape(cx, cy, sc) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(sc, sc);
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(0, 0, 24, 0, Math.PI * 2);
  ctx.arc(24, -6, 18, 0, Math.PI * 2);
  ctx.arc(42, 0, 20, 0, Math.PI * 2);
  ctx.arc(16, 10, 14, 0, Math.PI * 2);
  ctx.arc(34, 8, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBg() {
  const sky = ctx.createLinearGradient(0, 0, 0, W * 0.52);
  sky.addColorStop(0, '#0a1628');
  sky.addColorStop(0.5, '#1a3a6a');
  sky.addColorStop(1, '#2a5a9a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, W * 0.52);

  const sx = W * 0.72, sy = W * 0.16, sp = 1 + Math.sin(t * 1.2) * 0.04;

  // Sun glow
  for (let i = 4; i >= 1; i--) {
    ctx.save(); ctx.filter = `blur(${i * 12}px)`;
    ctx.fillStyle = `rgba(255, 210, 80, ${0.06 / i})`;
    ctx.beginPath(); ctx.arc(sx, sy, 40 * i * sp, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  }
  ctx.save(); ctx.filter = 'blur(8px)';
  ctx.fillStyle = '#ffe066'; ctx.beginPath(); ctx.arc(sx, sy, 36 * sp, 0, Math.PI * 2); ctx.fill(); ctx.restore();

  // Rays
  ctx.save(); ctx.translate(sx, sy);
  for (const r of rays) {
    ctx.strokeStyle = `rgba(255, 225, 100, ${0.05 + Math.sin(t * 0.6 + r.ph) * 0.03})`;
    ctx.lineWidth = r.w; ctx.lineCap = 'round';
    ctx.beginPath();
    const len = r.len * (1 + Math.sin(t + r.ph) * 0.06);
    ctx.moveTo(0, 0); ctx.lineTo(Math.cos(r.ang) * len, Math.sin(r.ang) * len);
    ctx.stroke();
  } ctx.restore();

  // Clouds
  for (const c of clouds) {
    c.x += c.spd;
    if (c.x > W + 100) c.x = -100;
    ctx.save(); ctx.globalAlpha = c.op; cloudShape(c.x, c.y, c.sc); ctx.restore();
  }

  // Stars
  for (const s of stars) {
    ctx.fillStyle = `rgba(255,255,255,${0.2 + Math.sin(t * s.speed + s.phase) * 0.2})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }

  // Wind streaks
  for (let i = 0; i < 3; i++) {
    const yp = W * 0.3 + i * 22 + Math.sin(t * 0.4 + i) * 3;
    const xp = ((t * 60 + i * 150) % (W + 60)) - 30;
    ctx.save(); ctx.globalAlpha = 0.04;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.beginPath();
    ctx.moveTo(xp, yp); ctx.lineTo(xp + 30 + Math.sin(t * 2 + i) * 6, yp); ctx.stroke();
    ctx.restore();
  }
}

const MX = 16, MW = W - MX * 2;
const GAP = 8;
let y = 0;

function ny(h) { const ry = y; y += h; return ry; }
function gap() { y += GAP; }

const CARD_X = MX;
const CARD_W = MW;

function divider(x1, x2, yy) {
  ctx.fillStyle = '#21262d';
  ctx.fillRect(x1, yy, x2 - x1, 1);
}

// ── RENDER ────────────────────────────────────────────
let t = 0;

function render() {
  t += 0.016;
  y = 0;

  const totalH = 730;
  canvas.height = totalH;
  canvas.style.height = totalH + 'px';

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, totalH);

  drawBg();

  // Main card
  const cardTop = W * 0.38;
  ctx.save();
  ctx.translate(0, cardTop);
  y = 0;

  // ── LOCATION ──
  gap();
  const locY = ny(36);
  dt(weather.location, 14, W / 2, locY + 14, '#8b949e', 'center', 'bold');
  gap();
  const updY = ny(18);
  dt(weather.updated, 10, W / 2, updY + 8, '#484f58');

  // ── MAIN TEMP ──
  gap();
  const tmpY = ny(96);
  const pulse = Math.sin(t * 1.2) * 1;
  ctx.save();
  ctx.filter = 'blur(6px)';
  dt(`${weather.current.temp_f}°`, 88, W / 2, tmpY + 70 + pulse, 'rgba(255,255,255,0.15)', 'center', 'bold');
  ctx.restore();
  dt(`${weather.current.temp_f}°`, 88, W / 2, tmpY + 70 + pulse, '#f0f6fc', 'center', 'bold');

  const condY = ny(30);
  dt(weather.current.condition, 22, W / 2, condY + 12, '#f0f6fc', 'center', 'bold');
  gap();
  const flY = ny(18);
  dt(`Feels like ${weather.current.feels_f}°`, 12, W / 2, flY + 6, '#6e7681');

  // ── STATS ROW 1 ──
  gap();
  const s1Y = ny(60);
  const sw = (CARD_W - GAP * 3) / 4;
  const stY = s1Y + 10;

  function statBox(sx, label, val, sub) {
    ctx.fillStyle = '#0d1117';
    fillRect(sx, stY, sw, 50, '#0d1117');
    dt(label, 9, sx + sw / 2, stY + 8, '#484f58', 'center', 'bold');
    dt(val, 18, sx + sw / 2, stY + 26, '#f0f6fc', 'center', 'bold');
    if (sub) dt(sub, 9, sx + sw / 2, stY + 42, '#6e7681', 'center');
  }

  statBox(MX, 'HUMIDITY', `${weather.current.humidity}%`, null);
  statBox(MX + sw + GAP, 'WIND', `${weather.wind.mph} mph`, weather.wind.direction);
  statBox(MX + (sw + GAP) * 2, 'PRESSURE', `${weather.pressure.hpa.toFixed(0)} hPa`, `${weather.pressure.inHg.toFixed(1)} in`);
  statBox(MX + (sw + GAP) * 3, 'UV INDEX', `${weather.uv}`, weather.uv < 3 ? 'Low' : weather.uv < 6 ? 'Moderate' : 'High');

  // ── STATS ROW 2 ──
  gap();
  const s2Y = ny(50);
  const st2Y = s2Y + 10;
  statBox(MX, 'DEW POINT', `${weather.dewpoint_f}°F`, null);
  statBox(MX + sw + GAP, 'VISIBILITY', weather.visibility, null);
  statBox(MX + (sw + GAP) * 2, 'PRECIP', `${weather.precip_mm} mm`, '0.00 in');
  statBox(MX + (sw + GAP) * 3, 'CLOUDS', `${weather.current.cloud}%`, null);

  // ── HIGH / LOW ──
  gap();
  const hlY = ny(44);
  ctx.fillStyle = '#161b22';
  fillRect(MX, hlY, CARD_W, 36, '#161b22');

  const mid = W / 2;
  dt('HIGH', 9, MX + 40, hlY + 10, '#f85149', 'center', 'bold');
  dt(`${weather.today.high_f}°`, 20, MX + 40, hlY + 24, '#f85149', 'center', 'bold');

  divider(mid - 20, mid + 20, hlY + 18);

  dt('LOW', 9, mid, hlY + 10, '#58a6ff', 'center', 'bold');
  dt(`${weather.today.low_f}°`, 20, mid, hlY + 24, '#58a6ff', 'center', 'bold');

  divider(mid + 60, mid + 140, hlY + 18);
  divider(mid + 160, mid + 220, hlY + 18);

  dt('SUNRISE', 8, mid + 105, hlY + 8, '#d29922', 'center', 'bold');
  dt(weather.sunrise, 13, mid + 105, hlY + 24, '#d29922', 'center', 'bold');

  dt('SUNSET', 8, W - MX - 50, hlY + 8, '#f97316', 'center', 'bold');
  dt(weather.sunset, 13, W - MX - 50, hlY + 24, '#f97316', 'center', 'bold');

  // ── HOURLY FORECAST ──
  gap();
  const hfY = ny(26);
  dt("HOURLY FORECAST", 10, W / 2, hfY + 8, '#484f58', 'center', 'bold');

  gap();
  const hfBoxY = ny(86);
  ctx.fillStyle = '#0d1117';
  fillRect(MX, hfBoxY, CARD_W, 76, '#0d1117');

  const n = weather.hourly.length;
  const itemW = (CARD_W - 4) / n;
  const startX = MX + 2;
  for (let i = 0; i < n; i++) {
    const h = weather.hourly[i];
    const ix = startX + i * itemW + itemW / 2;
    const iy = hfBoxY + 10;
    const bob = Math.sin(t * 2 + i * 0.4) * 1.5;
    dt(h.icon, 20, ix, iy + bob, '#f0f6fc', 'center');
    dt(h.hour, 9, ix, iy + 26, '#6e7681');
    dt(`${h.temp_f}°`, 14, ix, iy + 42, '#f0f6fc', 'center', 'bold');
    const precipColor = parseInt(h.precip) > 30 ? '#58a6ff' : '#3d444d';
    dt(h.precip, 9, ix, iy + 58, precipColor);
  }

  // ── 3-DAY OUTLOOK ──
  gap();
  const outTitleY = ny(26);
  dt("3-DAY OUTLOOK", 10, W / 2, outTitleY + 8, '#484f58', 'center', 'bold');

  gap();
  const outY = ny(90);
  ctx.fillStyle = '#0d1117';
  fillRect(MX, outY, CARD_W, 80, '#0d1117');

  const od = (CARD_W - 4) / 3;
  for (let i = 0; i < weather.outlook.length; i++) {
    const o = weather.outlook[i];
    const ox = MX + 4 + i * od + od / 2;
    const oy = outY + 10;

    dt(o.day, 10, ox, oy, '#8b949e', 'center', 'bold');
    dt(o.icon, 24, ox, oy + 18, '#f0f6fc', 'center');
    const condLines = o.condition.split(' ');
    for (let li = 0; li < condLines.length; li++) {
      dt(condLines[li], 9, ox, oy + 42 + li * 12, '#6e7681');
    }
    dt(`${o.high}° / ${o.low}°`, 13, ox, oy + 62, '#f0f6fc', 'center', 'bold');
  }

  // ── BOTTOM ──
  gap();
  dt('Open-Meteo · Huber Heights, OH', 9, W / 2, y + 4, '#21262d');

  ctx.restore();

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
