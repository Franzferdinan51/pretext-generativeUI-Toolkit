<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass Weather — Huber Heights</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    canvas { max-width: 100vw; max-height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
import { prepareWithSegments, layoutWithLines } from 'https://unpkg.com/@chenglou/pretext@0.0.3/dist/layout.js';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 780;
canvas.width = W; canvas.height = H;

let t = 0;

// ── WEATHER DATA ─────────────────────────────────────────
const weather = {
  temp: 70,
  feels: 71,
  humidity: 56,
  wind: 16.7,
  cloudCover: 5,
  condition: 'Clear',
  icon: '☀️',
  location: 'Huber Heights, OH',
  time: '1:00 PM',
  description: 'Clear sky',
  high: 74,
  low: 52,
  uvIndex: 6,
  pressure: 1018,
  visibility: 10,
  dewPoint: 53,
  // Hourly forecast (mock based on current)
  hourly: [
    { hour: '1 PM', temp: 70, icon: '☀️' },
    { hour: '2 PM', temp: 71, icon: '☀️' },
    { hour: '3 PM', temp: 72, icon: '⛅' },
    { hour: '4 PM', temp: 72, icon: '⛅' },
    { hour: '5 PM', temp: 71, icon: '☀️' },
    { hour: '6 PM', temp: 69, icon: '🌤️' },
  ]
};

// ── PRETEXT HELPERS ────────────────────────────────────────
function measure(text, font, maxW = 340, lh = 24) {
  const p = prepareWithSegments(text, font);
  return layoutWithLines(p, maxW, lh);
}

function drawText(text, font, x, y, color, align = 'center') {
  ctx.font = font;
  ctx.fillStyle = color;
  const lines = measure(text, font).lines;
  for (const line of lines) {
    let dx = x;
    if (align === 'center') dx = x - line.width / 2;
    else if (align === 'right') dx = x - line.width;
    ctx.fillText(line.text, dx, y + line.y + parseInt(font));
  }
}

// ── WEATHER-BASED PALETTE ─────────────────────────────────
const isNight = weather.time.includes('PM') && parseInt(weather.time) >= 6;
const palette = weather.condition === 'Clear' ? {
  skyTop: isNight ? '#0a1030' : '#1a4a8a',
  skyMid: isNight ? '#0d1840' : '#2980b9',
  skyBot: isNight ? '#050a20' : '#87ceeb',
  glowA: isNight ? '#4169e1' : '#f39c12',
  glowB: isNight ? '#6a5acd' : '#e74c3c',
  sunCore: isNight ? '#e8e8ff' : '#ffe066',
  tintR: 180, tintG: 200, tintB: 255,
} : {
  skyTop: '#2c3e50', skyMid: '#34495e', skyBot: '#5d6d7e',
  glowA: '#5dade2', glowB: '#3498db',
  sunCore: '#bdc3c7', tintR: 180, tintG: 200, tintB: 255,
};

// ── PARTICLES ─────────────────────────────────────────────
const stars = Array.from({ length: 60 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H * 0.6,
  r: Math.random() * 1.5 + 0.3,
  phase: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.5 + 0.2,
}));

const clouds = [
  { x: 60, y: 80, scale: 1.2, speed: 0.15, opacity: 0.12 },
  { x: 280, y: 55, scale: 0.8, speed: -0.1, opacity: 0.08 },
  { x: 380, y: 120, scale: 1.0, speed: 0.12, opacity: 0.1 },
  { x: 150, y: 140, scale: 0.7, speed: -0.08, opacity: 0.07 },
];

const rays = Array.from({ length: 12 }, (_, i) => ({
  angle: (i / 12) * Math.PI * 2,
  length: 180 + Math.random() * 80,
  width: 2 + Math.random() * 3,
  phase: (i / 12) * Math.PI * 2,
}));

// ── LIQUID GLASS ──────────────────────────────────────────
function drawGlass(x, y, w, h, radius = 16, blur = 18, opacity = 0.09) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
  ctx.clip();

  // blur fill
  ctx.filter = `blur(${blur}px)`;
  ctx.fillStyle = `rgba(${palette.tintR}, ${palette.tintG}, ${palette.tintB}, ${opacity})`;
  ctx.fillRect(x, y, w, h);
  ctx.filter = 'none';

  // top specular
  const hg = ctx.createLinearGradient(x, y, x, y + h * 0.45);
  hg.addColorStop(0, `rgba(255, 255, 255, ${opacity * 2.2})`);
  hg.addColorStop(0.4, `rgba(255, 255, 255, ${opacity * 0.5})`);
  hg.addColorStop(1, 'rgba(255, 255, 255, 0)');
  ctx.fillStyle = hg;
  ctx.fillRect(x, y, w, h * 0.45);

  // animated shimmer streak
  const shimmerW = w * 0.28;
  const sp = (t * 0.3 % 1) * (w + shimmerW) - shimmerW;
  const sg = ctx.createLinearGradient(x + sp, y, x + sp + shimmerW, y + h * 0.35);
  sg.addColorStop(0, 'rgba(255,255,255,0)');
  sg.addColorStop(0.5, `rgba(255,255,255,${opacity * 2.8})`);
  sg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(x + sp, y, shimmerW, h * 0.35);

  ctx.restore();

  // border
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.strokeStyle = `rgba(${palette.tintR + 30}, ${palette.tintG + 30}, ${palette.tintB + 30}, 0.22)`;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

// ── CLOUD DRAWING ─────────────────────────────────────────
function drawCloud(cx, cy, scale) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.arc(0, 0, 30, 0, Math.PI * 2);
  ctx.arc(28, -8, 22, 0, Math.PI * 2);
  ctx.arc(50, 0, 25, 0, Math.PI * 2);
  ctx.arc(20, 12, 18, 0, Math.PI * 2);
  ctx.arc(42, 10, 20, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ── DRAW WEATHER BACKGROUND ────────────────────────────────
function drawBackground() {
  // sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, palette.skyTop);
  sky.addColorStop(0.5, palette.skyMid);
  sky.addColorStop(1, palette.skyBot);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // sun/moon orb
  const sunX = W * 0.72, sunY = H * 0.18;
  const sunPulse = 1 + Math.sin(t * 1.5) * 0.04;

  // outer glow rings
  for (let i = 4; i >= 1; i--) {
    ctx.save();
    ctx.filter = `blur(${i * 15}px)`;
    ctx.fillStyle = weather.condition === 'Clear'
      ? (isNight ? `rgba(100, 120, 255, ${0.06 / i})` : `rgba(255, 200, 50, ${0.08 / i})`)
      : `rgba(180, 200, 220, ${0.05 / i})`;
    ctx.beginPath();
    ctx.arc(sunX, sunY, 55 * i * sunPulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // sun core
  ctx.save();
  ctx.filter = `blur(12px)`;
  ctx.fillStyle = palette.sunCore;
  ctx.beginPath();
  ctx.arc(sunX, sunY, 48 * sunPulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // sun rays
  if (weather.condition === 'Clear') {
    ctx.save();
    ctx.translate(sunX, sunY);
    for (const ray of rays) {
      const alpha = 0.08 + Math.sin(t * 0.8 + ray.phase) * 0.04;
      ctx.strokeStyle = `rgba(255, 240, 150, ${alpha})`;
      ctx.lineWidth = ray.width;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      const len = ray.length * (1 + Math.sin(t + ray.phase) * 0.08);
      ctx.lineTo(Math.cos(ray.angle) * len, Math.sin(ray.angle) * len);
      ctx.stroke();
    }
    ctx.restore();
  }

  // clouds
  for (const c of clouds) {
    c.x += c.speed;
    if (c.x > W + 100) c.x = -120;
    if (c.x < -120) c.x = W + 100;
    ctx.save();
    ctx.globalAlpha = c.opacity;
    drawCloud(c.x, c.y, c.scale);
    ctx.restore();
  }

  // stars (visible at night)
  if (isNight || weather.cloudCover < 20) {
    for (const s of stars) {
      const alpha = 0.3 + Math.sin(t * s.speed + s.phase) * 0.3;
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // wind streaks
  for (let i = 0; i < 5; i++) {
    const yPos = H * 0.3 + i * 40 + Math.sin(t * 0.5 + i) * 5;
    const xPos = ((t * 80 + i * 200) % (W + 100)) - 50;
    ctx.save();
    ctx.globalAlpha = 0.04 + Math.sin(t + i) * 0.02;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(xPos, yPos);
    ctx.lineTo(xPos + 40 + Math.sin(t * 2 + i) * 10, yPos);
    ctx.stroke();
    ctx.restore();
  }
}

// ── MAIN RENDER ──────────────────────────────────────────
function frame() {
  t += 0.016;

  drawBackground();

  // ── MAIN GLASS CARD ──
  const cardX = 20, cardY = 20, cardW = W - 40, cardH = H - 40;
  drawGlass(cardX, cardY, cardW, cardH, 24, 20, 0.07);

  // location
  drawText(weather.location, '13px Inter', W / 2, cardY + 28, '#94a3b8');

  // time
  drawText(weather.time, '12px Inter', W / 2, cardY + 46, '#64748b');

  // large temp
  ctx.save();
  ctx.filter = `blur(8px)`;
  ctx.font = 'bold 96px Inter';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`${weather.temp}°`, W / 2, cardY + 150 + Math.sin(t * 1.2) * 1.5);
  ctx.restore();
  ctx.font = 'bold 96px Inter';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`${weather.temp}°`, W / 2, cardY + 150 + Math.sin(t * 1.2) * 1.5);

  // condition
  drawText(weather.condition, 'bold 26px Inter', W / 2, cardY + 195, '#e2e8f0');

  // feels + wind row
  const row1Y = cardY + 230;
  drawGlass(30, row1Y, 100, 60, 14, 12, 0.06);
  drawText('FEELS LIKE', 'bold 10px Inter', 80, row1Y + 16, '#64748b');
  drawText(`${weather.feels}°`, 'bold 22px Inter', 80, row1Y + 42, '#ffffff');

  drawGlass(145, row1Y, 100, 60, 14, 12, 0.06);
  drawText('HUMIDITY', 'bold 10px Inter', 195, row1Y + 16, '#64748b');
  drawText(`${weather.humidity}%`, 'bold 22px Inter', 195, row1Y + 42, '#ffffff');

  drawGlass(260, row1Y, 100, 60, 14, 12, 0.06);
  drawText('WIND', 'bold 10px Inter', 310, row1Y + 16, '#64748b');
  drawText(`${weather.wind} mph`, 'bold 18px Inter', 310, row1Y + 42, '#ffffff');

  drawGlass(375, row1Y, 75, 60, 14, 12, 0.06);
  drawText('CLOUDS', 'bold 10px Inter', 412, row1Y + 16, '#64748b');
  drawText(`${weather.cloudCover}%`, 'bold 22px Inter', 412, row1Y + 42, '#ffffff');

  // stats row 2
  const row2Y = cardY + 310;
  drawGlass(30, row2Y, 100, 60, 14, 12, 0.06);
  drawText('HIGH / LOW', 'bold 10px Inter', 80, row2Y + 16, '#64748b');
  drawText(`${weather.high}° / ${weather.low}°`, 'bold 18px Inter', 80, row2Y + 42, '#ffffff');

  drawGlass(145, row2Y, 100, 60, 14, 12, 0.06);
  drawText('PRESSURE', 'bold 10px Inter', 195, row2Y + 16, '#64748b');
  drawText(`${weather.pressure} mb`, 'bold 18px Inter', 195, row2Y + 42, '#ffffff');

  drawGlass(260, row2Y, 100, 60, 14, 12, 0.06);
  drawText('VISIBILITY', 'bold 10px Inter', 310, row2Y + 16, '#64748b');
  drawText(`${weather.visibility} mi`, 'bold 18px Inter', 310, row2Y + 42, '#ffffff');

  drawGlass(375, row2Y, 75, 60, 14, 12, 0.06);
  drawText('UV INDEX', 'bold 10px Inter', 412, row2Y + 16, '#64748b');
  drawText(`${weather.uvIndex}`, 'bold 22px Inter', 412, row2Y + 42, '#ffffff');

  // hourly forecast
  const hourlyY = cardY + 400;
  drawText('HOURLY FORECAST', 'bold 11px Inter', W / 2, hourlyY, '#64748b');
  const itemW = 68;
  const startX = (W - weather.hourly.length * itemW) / 2;
  for (let i = 0; i < weather.hourly.length; i++) {
    const h = weather.hourly[i];
    const ix = startX + i * itemW + itemW / 2;
    const iy = hourlyY + 35;
    const pulse = 1 + Math.sin(t * 2 + i * 0.5) * 0.05;
    ctx.save();
    ctx.filter = `blur(10px)`;
    ctx.font = 'bold 22px Inter';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.15;
    ctx.fillText(h.icon, ix, iy - 5 + Math.sin(t + i) * 1.5);
    ctx.restore();
    ctx.font = 'bold 22px Inter';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 1;
    ctx.fillText(h.icon, ix, iy - 5 + Math.sin(t + i) * 1.5);
    drawText(h.hour, '10px Inter', ix, iy + 18, '#64748b', 'center');
    drawText(`${h.temp}°`, 'bold 16px Inter', ix, iy + 36, '#e2e8f0', 'center');
  }

  // tagline
  drawText('Powered by Pretext × Canvas', '10px Inter', W / 2, cardH - 30 + cardY, '#334155');

  requestAnimationFrame(frame);
}

frame();
</script>
</body>
</html>
