<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 380;
canvas.width = W;

const weather = {
  location: 'Huber Heights, OH',
  updated: '2:26 PM EDT · Mar 30',

  current: { temp_f: 73, feels_f: 69, humidity: 52, cloud: 10, condition: 'Clear', icon: '☀️' },
  wind: { mph: 16, direction: 'SW' },
  pressure: { hpa: 1018, inHg: 30.05 },
  uv: 3,
  dewpoint_f: 55,
  visibility: '10 mi',

  today: { high_f: 74, low_f: 59 },
  sunrise: '7:22 AM',
  sunset: '7:58 PM',

  hourly: [
    { hour: '2PM', temp: 73, icon: '☀️',  precip: '3%' },
    { hour: '3PM', temp: 72, icon: '☀️',  precip: '3%' },
    { hour: '4PM', temp: 69, icon: '☀️',  precip: '3%' },
    { hour: '5PM', temp: 67, icon: '☀️',  precip: '2%' },
    { hour: '6PM', temp: 66, icon: '☀️',  precip: '2%' },
    { hour: '7PM', temp: 66, icon: '☀️',  precip: '1%' },
    { hour: '8PM', temp: 65, icon: '🌙',  precip: '1%' },
    { hour: '9PM', temp: 65, icon: '🌙',  precip: '1%' },
  ],

  outlook: [
    { day: 'Today',     icon: '☀️',  high: 74, low: 59, condition: 'Clear',        precip: '0%'  },
    { day: 'Tomorrow',   icon: '☀️',  high: 81, low: 61, condition: 'Mostly Sunny', precip: '0%'  },
    { day: 'Wed Apr 1',  icon: '🌧️', high: 76, low: 61, condition: 'Rain',          precip: '60%' },
  ],
};

function dt(text, size, x, y, color, align, weight) {
  if (align === undefined) align = 'center';
  if (weight === undefined) weight = 'normal';
  ctx.font = weight + ' ' + size + 'px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.fillText(text, x, y);
  ctx.textAlign = 'left';
}

function fr(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function divider(x1, x2, yy) {
  const w = x2 - x1;
  if (w > 0) fr(x1, yy, w, 1, '#21262d');
}

const WX = 16;
const WW = W - WX * 2;
const COL3 = WW / 3;

let t = 0;

function row(y, h) {
  fr(WX, y, WW, h, '#161b22');
}

function render() {
  t += 0.016;

  canvas.height = 680;
  canvas.style.height = '680px';
  fr(0, 0, W, 680, '#0d1117');

  let y = 0;

  // ── SKY ─────────────────────────────────────────
  const skyH = 140;
  const sky = ctx.createLinearGradient(0, 0, 0, skyH);
  sky.addColorStop(0, '#0f2557');
  sky.addColorStop(1, '#2a5a9a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, skyH);

  const sx = W * 0.75, sy = 48;
  const sp = 1 + Math.sin(t * 1.2) * 0.04;
  for (let i = 3; i >= 1; i--) {
    ctx.save(); ctx.filter = `blur(${i * 10}px)`;
    ctx.fillStyle = `rgba(255,210,80,${0.06 / i})`;
    ctx.beginPath(); ctx.arc(sx, sy, 30 * i * sp, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  }
  ctx.save(); ctx.filter = 'blur(6px)';
  ctx.fillStyle = '#ffe066'; ctx.beginPath(); ctx.arc(sx, sy, 26 * sp, 0, Math.PI * 2); ctx.fill(); ctx.restore();

  y = skyH;

  // ── MAIN ──────────────────────────────────────────
  dt(weather.location, 13, W / 2, y + 8, '#8b949e', 'center', 'bold');
  dt(weather.updated, 9, W / 2, y + 24, '#484f58');

  const pulse = Math.sin(t * 1.2) * 1;
  dt(weather.current.temp_f + '°', 76, W / 2, y + 48 + pulse, '#ffffff', 'center', 'bold');
  dt(weather.current.condition, 20, W / 2, y + 96, '#f0f6fc', 'center', 'bold');
  dt('Feels like ' + weather.current.feels_f + '°', 11, W / 2, y + 116, '#6e7681');

  y += 132;

  // ── HIGH / LOW ──────────────────────────────────
  row(y, 40);
  const hlY = y;
  y += 40;

  const mid = W / 2;
  dt('HIGH', 9, WX + 44, hlY + 10, '#f85149', 'center', 'bold');
  dt(weather.today.high_f + '°', 18, WX + 44, hlY + 26, '#f85149', 'center', 'bold');
  divider(mid - 24, mid + 24, hlY + 10);
  dt('LOW', 9, mid, hlY + 10, '#58a6ff', 'center', 'bold');
  dt(weather.today.low_f + '°', 18, mid, hlY + 26, '#58a6ff', 'center', 'bold');
  divider(mid + 52, mid + 110, hlY + 10);
  dt('SUNRISE ' + weather.sunrise, 9, mid + 81, hlY + 10, '#d29922', 'center', 'bold');
  divider(mid + 160, mid + 220, hlY + 10);
  dt('SUNSET ' + weather.sunset, 9, W - WX, hlY + 10, '#f97316', 'right', 'bold');

  y += 12;

  // ── ROW: Humidity / Wind / Pressure ─────────────
  row(y, 54);
  y += 54;

  // Humidity
  dt('💧', 14, WX + 12, y - 46, '#8b949e');
  dt('HUMIDITY', 8, WX + 32, y - 48, '#484f58', 'left', 'bold');
  dt(weather.current.humidity + '%', 14, WX + 32, y - 32, '#c9d1d9', 'left');

  // Wind
  dt('💨', 14, WX + COL3 + 12, y - 46, '#8b949e');
  dt('WIND', 8, WX + COL3 + 32, y - 48, '#484f58', 'left', 'bold');
  dt(weather.wind.mph + ' mph ' + weather.wind.direction, 12, WX + COL3 + 32, y - 32, '#c9d1d9', 'left');

  // Pressure
  dt('🌡️', 14, WX + COL3 * 2 + 12, y - 46, '#8b949e');
  dt('PRESSURE', 8, WX + COL3 * 2 + 32, y - 48, '#484f58', 'left', 'bold');
  dt(weather.pressure.hpa + ' hPa / ' + weather.pressure.inHg + ' in', 11, WX + COL3 * 2 + 32, y - 32, '#c9d1d9', 'left');

  y += 8;

  // ── ROW: UV / Dew Point / Visibility ─────────────
  row(y, 54);
  y += 54;

  dt('☀️', 14, WX + 12, y - 46, '#8b949e');
  dt('UV INDEX', 8, WX + 32, y - 48, '#484f58', 'left', 'bold');
  dt(String(weather.uv), 14, WX + 32, y - 32, '#c9d1d9', 'left');

  dt('💧', 14, WX + COL3 + 12, y - 46, '#8b949e');
  dt('DEW POINT', 8, WX + COL3 + 32, y - 48, '#484f58', 'left', 'bold');
  dt(weather.dewpoint_f + '°F', 14, WX + COL3 + 32, y - 32, '#c9d1d9', 'left');

  dt('👁️', 14, WX + COL3 * 2 + 12, y - 46, '#8b949e');
  dt('VISIBILITY', 8, WX + COL3 * 2 + 32, y - 48, '#484f58', 'left', 'bold');
  dt(weather.visibility, 14, WX + COL3 * 2 + 32, y - 32, '#c9d1d9', 'left');

  y += 8;

  // ── ROW: Sunrise / Sunset / Clouds ──────────────
  row(y, 54);
  y += 54;

  dt('🌅', 14, WX + 12, y - 46, '#8b949e');
  dt('SUNRISE', 8, WX + 32, y - 48, '#484f58', 'left', 'bold');
  dt(weather.sunrise, 14, WX + 32, y - 32, '#c9d1d9', 'left');

  dt('🌇', 14, WX + COL3 + 12, y - 46, '#8b949e');
  dt('SUNSET', 8, WX + COL3 + 32, y - 48, '#484f58', 'left', 'bold');
  dt(weather.sunset, 14, WX + COL3 + 32, y - 32, '#c9d1d9', 'left');

  dt('☁️', 14, WX + COL3 * 2 + 12, y - 46, '#8b949e');
  dt('CLOUDS', 8, WX + COL3 * 2 + 32, y - 48, '#484f58', 'left', 'bold');
  dt(weather.current.cloud + '%', 14, WX + COL3 * 2 + 32, y - 32, '#c9d1d9', 'left');

  y += 14;

  // ── HOURLY ───────────────────────────────────────
  row(y, 108);
  const hfTitleY = y;
  y += 24;
  dt('HOURLY FORECAST', 10, W / 2, hfTitleY + 8, '#484f58', 'center', 'bold');
  y += 10;

  const n = weather.hourly.length;
  const hourItemW = (WW - 4) / n;
  for (let i = 0; i < n; i++) {
    const h = weather.hourly[i];
    const ix = WX + 2 + i * hourItemW + hourItemW / 2;
    const iy = y;
    const bob = Math.sin(t * 2 + i * 0.5) * 1;

    dt(h.icon, 16, ix, iy + bob, '#f0f6fc');
    dt(h.hour, 8, ix, iy + 22, '#6e7681');
    dt(h.temp + '°', 13, ix, iy + 38, '#f0f6fc', 'center', 'bold');
    dt('💧' + h.precip, 8, ix, iy + 54, parseInt(h.precip) > 20 ? '#58a6ff' : '#3d444d');
  }

  y += 74;
  y += 14;

  // ── 3-DAY OUTLOOK ───────────────────────────────
  row(y, 110);
  const outTitleY = y;
  y += 22;
  dt('3-DAY OUTLOOK', 10, W / 2, outTitleY + 8, '#484f58', 'center', 'bold');
  y += 10;

  const od = WW / 3;
  for (let i = 0; i < weather.outlook.length; i++) {
    const o = weather.outlook[i];
    const ox = WX + od * i + od / 2;
    const iy = y;

    dt(o.day, 9, ox, iy, '#8b949e', 'center', 'bold');
    dt(o.icon, 22, ox, iy + 18, '#f0f6fc');
    dt(o.condition, 9, ox, iy + 42, '#6e7681');
    dt(o.high + '°', 13, ox, iy + 58, '#f0f6fc', 'center', 'bold');
    dt(o.low + '°', 11, ox, iy + 74, '#6e7681', 'center');
    dt('💧 ' + o.precip, 9, ox, iy + 88, parseInt(o.precip) > 30 ? '#58a6ff' : '#6e7681', 'center');
  }

  y += 100;
  dt('Open-Meteo · Huber Heights, OH', 9, W / 2, y + 6, '#21262d');

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
